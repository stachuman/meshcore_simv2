<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topologies - MeshCore Simulator</title>
<link rel="stylesheet" href="/static/css/common.css">
<style>
  .topo-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .topo-card:hover { border-color: var(--border-light); }
  .topo-info h3 { margin: 0 0 4px 0; font-size: 14px; }
  .topo-info .desc { color: var(--text-muted); font-size: 12px; margin-bottom: 4px; }
  .topo-info .meta { color: var(--text-dim); font-size: 11px; }
  .topo-actions { display: flex; gap: 6px; flex-shrink: 0; }

  .upload-area {
    border: 2px dashed var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
    text-align: center;
    color: var(--text-muted);
    cursor: pointer;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .upload-area:hover { border-color: var(--accent); }
  .upload-area.dragover { border-color: var(--accent); background: rgba(37,99,235,0.05); }

  .confirm-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
  }
  .confirm-dialog {
    background: var(--bg-secondary);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-lg);
    padding: 24px; max-width: 400px; width: 90%;
  }
  .confirm-dialog h3 { margin-bottom: 12px; }
  .confirm-dialog p { color: var(--text-muted); font-size: 12px; margin-bottom: 16px; }
  .confirm-dialog .btn-row { display: flex; gap: 8px; justify-content: flex-end; }

  /* From-config modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
  }
  .modal-dialog {
    background: var(--bg-secondary);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-lg);
    padding: 24px; max-width: 500px; width: 90%;
  }
  .modal-dialog h3 { margin-bottom: 12px; }
  .modal-dialog .btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
</style>
</head>
<body>

<nav class="navbar">
  <span class="brand">MeshCore Sim</span>
  <ul class="nav-links">
    <li><a href="/static/index.html">Dashboard</a></li>
    <li><a href="/static/simulations.html">Simulations</a></li>
    <li><a href="/static/topologies.html" class="active">Topologies</a></li>
    <li><a href="/static/scenarios.html">Scenarios</a></li>
  </ul>
  <span class="spacer"></span>
</nav>

<div class="page-wide">
  <div class="flex items-center justify-between mb-16">
    <h1 style="margin-bottom:0">Topologies</h1>
    <div class="flex gap-8">
      <button class="btn" onclick="loadTopologies()">Refresh</button>
      <button class="btn" onclick="showFromConfigModal()">Import from Config</button>
      <label class="btn" for="file-upload" style="cursor:pointer">Upload Topology</label>
      <input type="file" id="file-upload" accept=".json" style="display:none" onchange="handleUpload(event)">
      <a href="/static/topology_creator.html" class="btn btn-primary">Generate from API</a>
      <a href="/static/topology_editor.html" class="btn btn-primary">+ Create Topology</a>
    </div>
  </div>

  <div id="upload-area" class="upload-area" onclick="document.getElementById('file-upload').click()">
    Drop a topology JSON file here or click to upload
  </div>

  <div id="topos-loading" class="empty-state">
    <div class="spinner"></div>
    <p>Loading topologies...</p>
  </div>

  <div id="topos-empty" class="empty-state" style="display:none">
    <p>No topologies yet.</p>
    <p style="color:var(--text-muted);font-size:12px;">Create a topology or import one from a config.</p>
  </div>

  <div id="topos-list" style="display:none"></div>
</div>

<div id="confirm-dialog" style="display:none"></div>
<div id="from-config-modal" style="display:none"></div>

<script src="/static/js/api.js"></script>
<script>
const $ = s => document.querySelector(s);

// Drag & drop
const uploadArea = $('#upload-area');
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault();
  uploadArea.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) uploadFile(file);
});

function handleUpload(e) {
  const file = e.target.files[0];
  if (file) uploadFile(file);
  e.target.value = '';
}

async function uploadFile(file) {
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    const name = file.name.replace(/\.json$/i, '');
    // Try to detect if it's a full config or a topology
    const nodes = data.nodes || [];
    const links = data.links || data.topology?.links || [];
    const radio = data.radio || data.simulation?.radio || {};
    await postJSON('/api/topologies/', { name, nodes, links, radio });
    loadTopologies();
  } catch (err) {
    alert('Failed to upload topology: ' + err.message);
  }
}

function formatDate(ts) {
  if (!ts) return '-';
  return new Date(ts * 1000).toLocaleString();
}

async function loadTopologies() {
  $('#topos-loading').style.display = '';
  $('#topos-empty').style.display = 'none';
  $('#topos-list').style.display = 'none';

  try {
    const topos = await fetchJSON('/api/topologies/');
    $('#topos-loading').style.display = 'none';

    if (!topos.length) {
      $('#topos-empty').style.display = '';
      return;
    }

    let html = '';
    for (const t of topos) {
      const geo = t.has_geo ? '<span class="badge badge-info" style="font-size:10px;margin-left:6px;">GEO</span>' : '';
      const radio = t.radio || {};
      const radioText = radio.sf ? 'SF' + radio.sf + '/' + (radio.bw ? (radio.bw/1000) + 'kHz' : '?') + (radio.cr ? '/CR4/' + (radio.cr+4) : '') : '';
      const radioBadge = radioText ? '<span class="badge" style="font-size:10px;margin-left:6px;background:var(--bg-primary);color:var(--text-muted)">' + radioText + '</span>' : '';
      const desc = t.description ? '<div class="desc">' + escapeHtml(t.description) + '</div>' : '';
      html += `
        <div class="topo-card">
          <div class="topo-info">
            <h3>${escapeHtml(t.name)}${geo}${radioBadge}</h3>
            ${desc}
            <div class="meta">${t.node_count} nodes &middot; ${t.link_count} links &middot; Updated ${formatDate(t.updated_at)} &middot; ID: ${t.id}</div>
          </div>
          <div class="topo-actions">
            <a href="/static/topology_editor.html?id=${encodeURIComponent(t.id)}" class="btn btn-sm">Edit</a>
            <a href="/static/scenario_editor.html?topology=${encodeURIComponent(t.id)}" class="btn btn-sm btn-primary">Use in Scenario</a>
            <button class="btn btn-sm" data-action="download" data-id="${t.id}" data-name="${escapeHtml(t.name)}">Download</button>
            <button class="btn btn-sm btn-danger" data-action="delete" data-id="${t.id}" data-name="${escapeHtml(t.name)}">Delete</button>
          </div>
        </div>`;
    }
    $('#topos-list').innerHTML = html;
    $('#topos-list').style.display = '';
    // Event delegation for action buttons
    $('#topos-list').querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', () => {
        const action = btn.dataset.action;
        const id = btn.dataset.id;
        const name = btn.dataset.name;
        if (action === 'download') downloadTopo(id, name);
        else if (action === 'delete') confirmDelete(id, name);
      });
    });
  } catch (err) {
    $('#topos-loading').innerHTML = '<p style="color:var(--error)">Failed to load topologies: ' + escapeHtml(err.message) + '</p>';
  }
}

async function downloadTopo(id, name) {
  try {
    const data = await fetchJSON('/api/topologies/' + id);
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (name || id) + '.json';
    a.click();
    URL.revokeObjectURL(url);
  } catch (err) {
    alert('Download failed: ' + err.message);
  }
}

function confirmDelete(id, name) {
  $('#confirm-dialog').style.display = '';
  $('#confirm-dialog').innerHTML = `
    <div class="confirm-overlay" onclick="closeConfirm(event)">
      <div class="confirm-dialog" onclick="event.stopPropagation()">
        <h3>Delete Topology</h3>
        <p>Delete "${escapeHtml(name)}"? This cannot be undone.</p>
        <div class="btn-row">
          <button class="btn" onclick="closeConfirm()">Cancel</button>
          <button class="btn btn-danger" onclick="doDelete('${id}')">Delete</button>
        </div>
      </div>
    </div>`;
}

function closeConfirm(e) {
  if (e && e.target !== e.currentTarget) return;
  $('#confirm-dialog').style.display = 'none';
}

async function doDelete(id) {
  try {
    await deleteJSON('/api/topologies/' + id);
    closeConfirm();
    loadTopologies();
  } catch (err) {
    alert('Delete failed: ' + err.message);
  }
}

// From-config import modal
async function showFromConfigModal() {
  let configs = [];
  try {
    configs = await fetchJSON('/api/configs/');
  } catch (e) {
    alert('Failed to load configs: ' + e.message);
    return;
  }

  if (!configs.length) {
    alert('No saved configs to import from.');
    return;
  }

  let options = configs.map(c =>
    `<option value="${c.id}">${escapeHtml(c.name)} (${c.node_count} nodes)</option>`
  ).join('');

  $('#from-config-modal').style.display = '';
  $('#from-config-modal').innerHTML = `
    <div class="modal-overlay" onclick="closeFromConfig(event)">
      <div class="modal-dialog" onclick="event.stopPropagation()">
        <h3>Import Topology from Config</h3>
        <p style="color:var(--text-muted);font-size:12px;margin-bottom:12px;">
          Extract nodes, links, and radio settings from an existing config into a reusable topology.
        </p>
        <label class="form-label">Select config:</label>
        <select id="from-config-select" class="form-select">${options}</select>
        <label class="form-label mt-12">Topology name (optional):</label>
        <input id="from-config-name" class="form-input" type="text" placeholder="Auto-generated if empty">
        <div class="btn-row">
          <button class="btn" onclick="closeFromConfig()">Cancel</button>
          <button class="btn btn-primary" onclick="doFromConfig()">Import</button>
        </div>
      </div>
    </div>`;
}

function closeFromConfig(e) {
  if (e && e.target !== e.currentTarget) return;
  $('#from-config-modal').style.display = 'none';
}

async function doFromConfig() {
  const configId = document.getElementById('from-config-select').value;
  const name = document.getElementById('from-config-name').value.trim();
  if (!configId) return;

  try {
    const entry = await fetchJSON('/api/configs/' + configId);
    await postJSON('/api/topologies/from-config', {
      config: entry.config,
      name: name || null,
    });
    closeFromConfig();
    loadTopologies();
  } catch (err) {
    alert('Import failed: ' + err.message);
  }
}

loadTopologies();
</script>
</body>
</html>
