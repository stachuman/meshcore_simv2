<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Simulation - MeshCore Simulator</title>
<link rel="stylesheet" href="/static/css/common.css">
<style>
  .ia-layout {
    display: flex;
    height: calc(100vh - 44px);
    overflow: hidden;
  }

  /* Left sidebar — node cards */
  .ia-sidebar {
    width: 260px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--bg-secondary);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .ia-sidebar h3 {
    padding: 10px 12px 6px;
    margin: 0;
    font-size: 12px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border-light);
  }
  .node-card {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border-light);
    cursor: pointer;
    transition: background 0.1s;
  }
  .node-card:hover { background: var(--bg-tertiary); }
  .node-card.active { background: #dbeafe; }
  .node-card .node-name {
    font-weight: 600;
    font-size: 12px;
  }
  .node-card .node-role {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    margin-left: 6px;
  }
  .node-role-repeater { background: #dbeafe; color: #2563eb; }
  .node-role-companion { background: #dcfce7; color: #16a34a; }
  .node-detail {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.2s;
  }
  .node-card.expanded .node-detail { max-height: 300px; }
  .node-detail pre {
    font-size: 10px;
    white-space: pre-wrap;
    word-break: break-all;
    margin-top: 4px;
    padding: 4px 6px;
    background: var(--bg-tertiary);
    border-radius: var(--radius);
  }

  /* Center — event log + controls */
  .ia-center {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  /* Top bar */
  .ia-topbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .ia-topbar .session-info {
    font-size: 11px;
    color: var(--text-muted);
  }
  .ia-topbar .sim-time {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-heading);
  }
  .ia-topbar .step-input {
    width: 80px;
    padding: 4px 8px;
    font-size: 12px;
    font-family: var(--font-mono);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-input);
    color: var(--text);
  }
  .ia-topbar .conn-status {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 3px;
    font-weight: 700;
    text-transform: uppercase;
  }
  .conn-connected { background: #dcfce7; color: var(--success); }
  .conn-disconnected { background: #fee2e2; color: var(--error); }
  .conn-connecting { background: #fef3c7; color: var(--warning); }

  /* Visualization iframe */
  .ia-viz-wrap {
    flex: 1;
    min-height: 150px;
    position: relative;
    overflow: hidden;
  }
  .ia-viz-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* Resize handle */
  .ia-resize-handle {
    height: 6px;
    cursor: row-resize;
    background: var(--border);
    flex-shrink: 0;
    transition: background 0.15s;
    position: relative;
  }
  .ia-resize-handle:hover,
  .ia-resize-handle.active { background: var(--accent); }
  .ia-resize-handle::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 1px;
    transform: translateX(-50%);
    width: 32px;
    height: 4px;
    border-top: 1px solid rgba(0,0,0,0.15);
    border-bottom: 1px solid rgba(0,0,0,0.15);
  }

  /* Events panel (below resize handle) */
  .ia-events-panel {
    height: 200px;
    min-height: 60px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Event log */
  .ia-events {
    flex: 1;
    overflow-y: auto;
    background: var(--bg-primary);
  }
  .ia-events table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
  }
  .ia-events thead {
    position: sticky;
    top: 0;
    z-index: 2;
  }
  .ia-events th {
    text-align: left;
    padding: 6px 8px;
    background: var(--bg-secondary);
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    font-size: 10px;
  }
  .ia-events td {
    padding: 4px 8px;
    border-bottom: 1px solid var(--border-light);
    vertical-align: top;
  }
  .ia-events tr:hover td { background: rgba(37, 99, 235, 0.04); }
  .evt-tx td { border-left: 3px solid #2563eb; }
  .evt-rx td { border-left: 3px solid #16a34a; }
  .evt-collision td { border-left: 3px solid #dc2626; }
  .evt-drop_halfduplex td, .evt-drop_loss td { border-left: 3px solid #d97706; }
  .evt-cmd_reply td { border-left: 3px solid #8b5cf6; }
  .evt-other td { border-left: 3px solid #9ca3af; }

  /* Filter bar */
  .ia-filter {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 14px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border-light);
    font-size: 11px;
    flex-shrink: 0;
  }
  .ia-filter select {
    font-size: 11px;
    font-family: var(--font-mono);
    padding: 2px 6px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-input);
    color: var(--text);
  }
  .ia-filter label { color: var(--text-muted); }
  .event-count { color: var(--text-dim); }

  /* Bottom command bar */
  .ia-cmdbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .ia-cmdbar select, .ia-cmdbar input[type="text"] {
    font-size: 12px;
    font-family: var(--font-mono);
    padding: 5px 8px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-input);
    color: var(--text);
  }
  .ia-cmdbar input[type="text"] { flex: 1; }
  .ia-cmdbar .cmd-help-anchor { position: relative; }

  /* Command helper popover */
  .cmd-help-pop {
    position: absolute; bottom: 100%; right: 0;
    margin-bottom: 6px;
    width: 280px; max-height: 340px; overflow-y: auto;
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: 0 -4px 24px rgba(0,0,0,0.12);
    z-index: 200; padding: 6px 0;
  }
  .cmd-help-pop .cmd-group { padding: 4px 10px 2px; font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  .cmd-help-pop .cmd-item {
    display: flex; align-items: baseline; gap: 6px;
    padding: 4px 10px; cursor: pointer; font-size: 11px;
  }
  .cmd-help-pop .cmd-item:hover { background: rgba(37,99,235,0.06); }
  .cmd-help-pop .cmd-item .cmd-name { font-family: var(--font-mono); color: var(--accent); white-space: nowrap; }
  .cmd-help-pop .cmd-item .cmd-desc { color: var(--text-muted); font-size: 10px; }

  /* Create flow */
  .create-flow {
    max-width: 600px;
    margin: 48px auto;
    padding: 0 20px;
  }
  .create-flow h1 { margin-bottom: 24px; }
  .config-list {
    max-height: 400px;
    overflow-y: auto;
  }
  .config-item {
    padding: 10px 14px;
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    margin-bottom: 8px;
    cursor: pointer;
    background: var(--bg-secondary);
    transition: border-color 0.15s;
  }
  .config-item:hover { border-color: var(--accent); }
  .config-item.selected { border-color: var(--accent); background: #dbeafe; }
  .config-item .config-name { font-weight: 600; font-size: 13px; }
  .config-item .config-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* Startup overlay */
  .ia-startup-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg-primary);
    z-index: 5;
    gap: 12px;
  }
  .ia-startup-overlay .spinner { width: 32px; height: 32px; }
  .ia-startup-overlay .startup-msg {
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
    max-width: 320px;
  }
  .ia-startup-overlay .startup-phase {
    font-size: 11px;
    color: var(--text-dim);
    font-family: var(--font-mono);
  }
  @keyframes startup-dots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }
  .startup-dots::after {
    content: '';
    animation: startup-dots 1.5s steps(4, end) infinite;
  }

  /* Post-session bar */
  .ia-post {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: #fef3c7;
    border-top: 1px solid #fcd34d;
    flex-shrink: 0;
  }
  .ia-post span { font-size: 12px; color: var(--warning); font-weight: 600; }
</style>
</head>
<body>

<!-- Nav bar -->
<nav class="navbar">
  <span class="brand">MeshCore Sim</span>
  <ul class="nav-links">
    <li><a href="/static/index.html">Dashboard</a></li>
    <li><a href="/static/simulations.html">Simulations</a></li>
    <li><a href="/static/topologies.html">Topologies</a></li>
    <li><a href="/static/scenarios.html">Scenarios</a></li>
  </ul>
  <span class="spacer"></span>
</nav>

<!-- Create flow (shown when no ?id= param) -->
<div id="create-flow" class="create-flow hidden">
  <h1>New Interactive Session</h1>
  <div class="card">
    <h3>Select a saved config</h3>
    <div id="config-list" class="config-list mt-8">
      <div class="empty-state"><p>Loading configs...</p></div>
    </div>
  </div>
  <div class="flex gap-8 items-center mt-12">
    <button class="btn btn-primary btn-lg" id="btn-create" disabled>Start Interactive Session</button>
    <span id="create-status" style="font-size:12px; color:var(--text-muted)"></span>
  </div>
</div>

<!-- Session UI (shown when ?id= param present) -->
<div id="session-ui" class="ia-layout hidden">
  <!-- Left sidebar -->
  <div class="ia-sidebar">
    <h3>Nodes</h3>
    <div id="node-list"></div>
  </div>

  <!-- Center -->
  <div class="ia-center">
    <!-- Top bar -->
    <div class="ia-topbar">
      <span class="session-info" id="session-id"></span>
      <span class="conn-status conn-connecting" id="conn-status">Connecting</span>
      <span class="spacer"></span>
      <span class="sim-time" id="sim-time">0.000s</span>
      <span style="color:var(--text-dim); font-size:11px">step:</span>
      <input type="number" class="step-input" id="step-ms" value="1000" min="1">
      <span style="color:var(--text-dim); font-size:11px">ms</span>
      <button class="btn btn-sm btn-primary" id="btn-step">Step</button>
      <button class="btn btn-sm" id="btn-next">Next</button>
      <button class="btn btn-sm btn-success" id="btn-run-all">Run All</button>
      <button class="btn btn-sm" id="btn-summary">Summary</button>
    </div>

    <!-- Canvas visualization (iframe) -->
    <div class="ia-viz-wrap" id="viz-wrap">
      <div class="ia-startup-overlay" id="startup-overlay">
        <div class="spinner"></div>
        <div class="startup-msg" id="startup-msg">Connecting to session<span class="startup-dots"></span></div>
        <div class="startup-phase" id="startup-phase"></div>
      </div>
      <iframe id="viz-iframe" title="Swim-lane visualization"></iframe>
    </div>

    <!-- Resize handle -->
    <div class="ia-resize-handle" id="resize-handle"></div>

    <!-- Event log panel -->
    <div class="ia-events-panel" id="events-panel">
      <!-- Filter bar -->
      <div class="ia-filter">
        <label>Filter:</label>
        <select id="event-filter">
          <option value="all">All Events</option>
          <option value="tx">TX</option>
          <option value="rx">RX</option>
          <option value="collision">Collision</option>
          <option value="drop">Drops</option>
          <option value="cmd_reply">Cmd Reply</option>
        </select>
        <span class="event-count" id="event-count">0 events</span>
        <span class="spacer"></span>
        <label><input type="checkbox" id="auto-scroll" checked> Auto-scroll</label>
        <button class="btn btn-sm" id="btn-clear-events">Clear</button>
      </div>

      <!-- Event log table -->
      <div class="ia-events" id="events-container">
        <table>
          <thead>
            <tr>
              <th style="width:80px">Time</th>
              <th style="width:70px">Type</th>
              <th style="width:80px">From</th>
              <th style="width:80px">To</th>
              <th style="width:70px">Pkt</th>
              <th>Details</th>
            </tr>
          </thead>
          <tbody id="events-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- Post-session bar (hidden until session closes) -->
    <div class="ia-post hidden" id="post-bar">
      <span>Session ended</span>
      <span class="spacer"></span>
      <button class="btn btn-sm btn-primary" id="btn-export">Export to Simulations</button>
      <button class="btn btn-sm" id="btn-view-timeline" style="display:none">View Timeline</button>
    </div>

    <!-- Command bar -->
    <div class="ia-cmdbar" id="cmd-bar">
      <select id="cmd-node"><option value="">-- node --</option></select>
      <input type="text" id="cmd-input" placeholder="Command (e.g. msg bob hello)">
      <button class="btn btn-sm btn-primary" id="btn-send-cmd">Send</button>
      <div class="cmd-help-anchor">
        <button class="btn btn-sm" id="btn-companion-cmds">Companion Cmds</button>
      </div>
      <div class="cmd-help-anchor">
        <button class="btn btn-sm" id="btn-repeater-cmds">Repeater Cmds</button>
      </div>
    </div>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script>
(function() {
  const MAX_EVENTS = 1000;
  let sessionId = new URLSearchParams(window.location.search).get('id');
  let wsConn = null;
  let events = [];
  let sessionClosed = false;

  // ── Route: create flow or session UI ──
  if (!sessionId) {
    showCreateFlow();
  } else {
    showSessionUI();
  }

  // ── Create flow ──────────────────────────────────────
  function showCreateFlow() {
    document.getElementById('create-flow').classList.remove('hidden');
    loadConfigs();
  }

  let selectedConfigId = null;
  let selectedConfigJson = null;
  let selectedTopoId = null;

  async function loadConfigs() {
    try {
      const configs = await fetchJSON('/api/configs/');
      const list = document.getElementById('config-list');
      if (!configs.length) {
        list.innerHTML = '<div class="empty-state"><p>No saved configs. Create one in the Scenario Editor first.</p></div>';
        return;
      }
      list.innerHTML = '';
      configs.forEach(c => {
        const item = el('div', 'config-item');
        item.innerHTML = `
          <div class="config-name">${escapeHtml(c.name || c.id)}</div>
          <div class="config-meta">${c.node_count || '?'} nodes &middot; ${c.command_count || 0} commands</div>
        `;
        item.addEventListener('click', async () => {
          list.querySelectorAll('.config-item').forEach(x => x.classList.remove('selected'));
          item.classList.add('selected');
          selectedConfigId = c.id;
          // Fetch full config
          const full = await fetchJSON('/api/configs/' + c.id);
          selectedConfigJson = full.config || full.config_json || full.content || full;
          selectedTopoId = full.topology_id || null;
          document.getElementById('btn-create').disabled = false;
        });
        list.appendChild(item);
      });
    } catch (e) {
      document.getElementById('config-list').innerHTML =
        `<div class="alert alert-error">${escapeHtml(e.message)}</div>`;
    }
  }

  document.getElementById('btn-create').addEventListener('click', async function() {
    if (!selectedConfigJson) return;
    this.disabled = true;
    document.getElementById('create-status').textContent = 'Creating session...';
    try {
      const body = { config_json: selectedConfigJson };
      if (selectedTopoId) body.topology_id = selectedTopoId;
      const result = await postJSON('/api/interactive/', body);
      window.location.href = '/static/interactive.html?id=' + encodeURIComponent(result.id);
    } catch (e) {
      document.getElementById('create-status').textContent = 'Error: ' + e.message;
      this.disabled = false;
    }
  });

  // ── Session UI ──────────────────────────────────────
  function showSessionUI() {
    document.getElementById('session-ui').classList.remove('hidden');
    document.getElementById('session-id').textContent = 'Session: ' + sessionId;
    connectWebSocket();
  }

  function connectWebSocket() {
    setConnStatus('connecting');
    wsConn = connectWS('/api/interactive/' + sessionId + '/ws', {
      onOpen() {
        // Don't set 'connected' yet — wait for 'ready' or 'starting' message
      },
      onMessage(msg) {
        handleWSMessage(msg);
      },
      onClose() {
        if (!sessionClosed) setConnStatus('disconnected');
      },
      onError() {
        setConnStatus('disconnected');
      },
    }, { reconnect: true, reconnectDelay: 2000 });
  }

  function setConnStatus(s) {
    const el = document.getElementById('conn-status');
    el.className = 'conn-status conn-' + s;
    el.textContent = s.charAt(0).toUpperCase() + s.slice(1);
  }

  // ── WS message handler ──────────────────────────────
  function handleWSMessage(msg) {
    switch (msg.type) {
      case 'starting':
        showStartupStatus(msg.message || 'Initializing orchestrator...');
        break;
      case 'ready':
        hideStartupOverlay();
        setConnStatus('connected');
        populateNodes(msg.nodes);
        updateTime(msg.time_ms);
        if (msg.step_ms) document.getElementById('step-ms').value = msg.step_ms;
        // Load visualization iframe
        initVizIframe();
        break;
      case 'event':
        addEvent(msg.data);
        break;
      case 'response':
        handleResponse(msg);
        break;
      case 'closed':
        sessionClosed = true;
        hideStartupOverlay();
        setConnStatus('disconnected');
        document.getElementById('post-bar').classList.remove('hidden');
        document.querySelector('#post-bar span').textContent = 'Session ended: ' + (msg.reason || 'closed');
        disableControls();
        if (wsConn) wsConn.close();
        break;
      case 'error':
        addSystemEvent('Error: ' + msg.message);
        break;
    }
  }

  function showStartupStatus(message) {
    const overlay = document.getElementById('startup-overlay');
    const msgEl = document.getElementById('startup-msg');
    const phaseEl = document.getElementById('startup-phase');
    if (overlay) overlay.style.display = '';
    if (msgEl) msgEl.innerHTML = escapeHtml(message) + '<span class="startup-dots"></span>';
    if (phaseEl) {
      phaseEl.textContent = 'Nodes are exchanging adverts to discover each other';
    }
    // Update conn-status to show something more descriptive
    const connEl = document.getElementById('conn-status');
    connEl.className = 'conn-status conn-connecting';
    connEl.textContent = 'Starting';
  }

  function hideStartupOverlay() {
    const overlay = document.getElementById('startup-overlay');
    if (overlay) overlay.style.display = 'none';
  }

  function handleResponse(msg) {
    const data = msg.data;
    if (!data) return;

    if (data.error) {
      addSystemEvent('Error: ' + data.error);
      return;
    }

    // Update time from step/next/time responses
    if (data.stepped_to_ms !== undefined) updateTime(data.stepped_to_ms);
    else if (data.time_ms !== undefined) updateTime(data.time_ms);

    // Handle finished
    if (data.finished) {
      addSystemEvent('Simulation finished');
    }

    // cmd responses
    if (msg.cmd === 'status' || msg.cmd === 'nodes' || msg.cmd === 'summary' || msg.cmd === 'events' || msg.cmd === 'cmd' || msg.cmd === 'lua') {
      addSystemEvent(msg.cmd + ': ' + JSON.stringify(data, null, 0).substring(0, 200));
    }

    // Update node detail if status response
    if (msg.cmd === 'status' && data.node) {
      updateNodeDetail(data);
    }
  }

  // ── Time display ────────────────────────────────────
  function updateTime(ms) {
    const s = (ms / 1000).toFixed(3);
    document.getElementById('sim-time').textContent = s + 's';
    // Notify iframe to update viewport immediately (no polling delay)
    const iframe = document.getElementById('viz-iframe');
    if (iframe && iframe.contentWindow) {
      try {
        iframe.contentWindow.postMessage({ type: 'timeUpdate', time_ms: ms }, '*');
      } catch (_) {}
    }
  }

  // ── Nodes ───────────────────────────────────────────
  function populateNodes(nodes) {
    const list = document.getElementById('node-list');
    const select = document.getElementById('cmd-node');
    list.innerHTML = '';
    select.innerHTML = '<option value="">-- node --</option>';

    // Sort: companions first, then repeaters, alphabetical within each
    const companions = nodes.filter(n => n.role === 'companion').sort((a, b) => a.name.localeCompare(b.name));
    const repeaters = nodes.filter(n => n.role !== 'companion').sort((a, b) => a.name.localeCompare(b.name));
    const sorted = [...companions, ...repeaters];

    // Sidebar cards
    sorted.forEach(n => {
      const card = document.createElement('div');
      card.className = 'node-card';
      card.dataset.name = n.name;
      const roleClass = n.role === 'repeater' ? 'node-role-repeater' : 'node-role-companion';
      card.innerHTML = `
        <span class="node-name">${escapeHtml(n.name)}</span>
        <span class="node-role ${roleClass}">${escapeHtml(n.role)}</span>
        <div class="node-detail"><div class="spinner" style="margin:8px auto;display:none"></div><pre></pre></div>
      `;
      card.addEventListener('click', () => toggleNodeCard(card, n.name));
      list.appendChild(card);
    });

    // Command bar dropdown with optgroups
    if (companions.length > 0 && repeaters.length > 0) {
      const compGroup = document.createElement('optgroup');
      compGroup.label = 'Companions';
      companions.forEach(n => {
        const opt = document.createElement('option');
        opt.value = n.name;
        opt.textContent = n.name;
        compGroup.appendChild(opt);
      });
      select.appendChild(compGroup);

      const repGroup = document.createElement('optgroup');
      repGroup.label = 'Repeaters';
      repeaters.forEach(n => {
        const opt = document.createElement('option');
        opt.value = n.name;
        opt.textContent = n.name;
        repGroup.appendChild(opt);
      });
      select.appendChild(repGroup);
    } else {
      sorted.forEach(n => {
        const opt = document.createElement('option');
        opt.value = n.name;
        opt.textContent = n.name;
        select.appendChild(opt);
      });
    }
  }

  function toggleNodeCard(card, name) {
    const wasExpanded = card.classList.contains('expanded');
    // Collapse all
    document.querySelectorAll('.node-card').forEach(c => c.classList.remove('expanded', 'active'));
    if (!wasExpanded) {
      card.classList.add('expanded', 'active');
      queryNodeStatus(card, name);
    }
  }

  async function queryNodeStatus(card, name) {
    const spinner = card.querySelector('.spinner');
    const pre = card.querySelector('pre');
    spinner.style.display = 'block';
    pre.textContent = '';

    if (wsConn) {
      wsConn.send({ cmd: 'status', node: name });
    }
    // Response will be handled via handleResponse → updateNodeDetail
  }

  function updateNodeDetail(data) {
    const card = document.querySelector(`.node-card[data-name="${data.node}"]`);
    if (!card) return;
    const spinner = card.querySelector('.spinner');
    const pre = card.querySelector('pre');
    spinner.style.display = 'none';

    let text = '';
    if (data.neighbors) {
      text += `Neighbors (${data.neighbor_count}):\n`;
      data.neighbors.forEach(nb => {
        text += `  ${nb.name || nb.pubkey}: SNR ${nb.snr_db}dB, ${nb.last_seen_s}s ago\n`;
      });
    }
    if (data.contacts) {
      text += `Contacts (${data.contact_count}):\n`;
      data.contacts.forEach(c => {
        text += `  ${c.name || c.pubkey}: path=${c.path_len}, ${c.last_seen_s}s ago\n`;
      });
    }
    if (!text) text = JSON.stringify(data, null, 2);
    pre.textContent = text;
  }

  // ── Event log ───────────────────────────────────────
  const eventFilter = document.getElementById('event-filter');
  const eventsTbody = document.getElementById('events-tbody');
  const eventsContainer = document.getElementById('events-container');

  function addEvent(evt) {
    events.push(evt);
    if (events.length > MAX_EVENTS) {
      events.shift();
      // Remove first row
      if (eventsTbody.firstChild) eventsTbody.removeChild(eventsTbody.firstChild);
    }
    const row = createEventRow(evt);
    if (row) {
      eventsTbody.appendChild(row);
      if (document.getElementById('auto-scroll').checked) {
        eventsContainer.scrollTop = eventsContainer.scrollHeight;
      }
    }
    document.getElementById('event-count').textContent = events.length + ' events';
  }

  function addSystemEvent(text) {
    addEvent({ type: '_system', _text: text, time_ms: null });
  }

  function createEventRow(evt) {
    // Filter check
    const filter = eventFilter.value;
    if (!passesFilter(evt, filter)) return null;

    const tr = document.createElement('tr');
    const evtType = evt.type || 'other';
    if (evtType === '_system') {
      tr.className = 'evt-other';
      tr.innerHTML = `<td colspan="6" style="color:var(--text-muted); font-style:italic">${escapeHtml(evt._text)}</td>`;
      return tr;
    }

    const cssClass = evtType.startsWith('drop') ? 'evt-' + evtType : 'evt-' + evtType;
    tr.className = 'evt-' + (evtType.startsWith('drop') ? evtType : evtType);
    if (!tr.className.match(/evt-(tx|rx|collision|drop_halfduplex|drop_loss|cmd_reply)/)) {
      tr.className = 'evt-other';
    }

    const timeStr = evt.time_ms != null ? (evt.time_ms / 1000).toFixed(3) : '--';
    const from = evt.node || evt.from || '';
    const to = evt.to || '';
    const pkt = evt.pkt || '';

    let details = '';
    if (evtType === 'tx') {
      details = `${evt.pkt_type || ''} ${evt.route || ''} air=${evt.airtime_ms || ''}ms`;
    } else if (evtType === 'rx') {
      details = `SNR=${evt.snr != null ? evt.snr.toFixed(1) : '?'}dB ${evt.pkt_type || ''}`;
    } else if (evtType === 'collision') {
      details = `interferer=${evt.interferer || '?'} margin=${evt.snr_margin != null ? evt.snr_margin.toFixed(1) : '?'}dB`;
    } else if (evtType === 'cmd_reply') {
      details = `${evt.command || ''}: ${truncate(evt.reply || '', 60)}`;
    } else if (evtType.startsWith('drop')) {
      details = evtType;
    } else {
      details = JSON.stringify(evt).substring(0, 80);
    }

    tr.innerHTML = `
      <td>${escapeHtml(timeStr)}</td>
      <td>${escapeHtml(evtType)}</td>
      <td>${escapeHtml(from)}</td>
      <td>${escapeHtml(to)}</td>
      <td title="${escapeHtml(pkt)}">${escapeHtml(truncate(pkt, 8))}</td>
      <td>${escapeHtml(details)}</td>
    `;
    return tr;
  }

  function passesFilter(evt, filter) {
    if (filter === 'all') return true;
    const t = evt.type || '';
    if (filter === 'drop') return t.startsWith('drop');
    return t === filter;
  }

  eventFilter.addEventListener('change', rebuildEventTable);

  function rebuildEventTable() {
    eventsTbody.innerHTML = '';
    events.forEach(evt => {
      const row = createEventRow(evt);
      if (row) eventsTbody.appendChild(row);
    });
    if (document.getElementById('auto-scroll').checked) {
      eventsContainer.scrollTop = eventsContainer.scrollHeight;
    }
  }

  document.getElementById('btn-clear-events').addEventListener('click', () => {
    events = [];
    eventsTbody.innerHTML = '';
    document.getElementById('event-count').textContent = '0 events';
    // Reload visualization iframe
    const iframe = document.getElementById('viz-iframe');
    if (iframe.src && iframe.src !== 'about:blank') {
      iframe.src = iframe.src;
    }
  });

  // ── Controls ────────────────────────────────────────
  document.getElementById('btn-step').addEventListener('click', () => {
    const ms = parseInt(document.getElementById('step-ms').value) || 1000;
    if (wsConn) wsConn.send({ cmd: 'step', ms: ms });
  });

  document.getElementById('btn-next').addEventListener('click', () => {
    if (wsConn) wsConn.send({ cmd: 'next_event' });
  });

  document.getElementById('btn-run-all').addEventListener('click', () => {
    // Step a very large amount to finish the simulation
    if (wsConn) wsConn.send({ cmd: 'step', ms: 999999999 });
  });

  document.getElementById('btn-summary').addEventListener('click', () => {
    if (wsConn) wsConn.send({ cmd: 'summary' });
  });

  // Command bar
  document.getElementById('btn-send-cmd').addEventListener('click', sendCommand);
  document.getElementById('cmd-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendCommand();
  });

  function sendCommand() {
    const node = document.getElementById('cmd-node').value;
    const command = document.getElementById('cmd-input').value.trim();
    if (!node || !command) return;
    if (wsConn) wsConn.send({ cmd: 'cmd', node: node, command: command });
    document.getElementById('cmd-input').value = '';
  }

  // Command helper popovers
  const COMPANION_CMDS = [
    { group: 'Messaging' },
    { cmd: 'msg <name> <text>', desc: 'Send direct message' },
    { cmd: 'msga <name> <text>', desc: 'Send message with ACK' },
    { cmd: 'msgc <text>', desc: 'Send channel message' },
    { group: 'Discovery' },
    { cmd: 'neighbors', desc: 'List known contacts' },
    { cmd: 'list', desc: 'List contacts by activity' },
    { cmd: 'advert', desc: 'Send advertisement' },
    { cmd: 'advert.zerohop', desc: 'Advert (direct only)' },
    { group: 'Path' },
    { cmd: 'path <name>', desc: 'Show path to contact' },
    { cmd: 'reset_path <name>', desc: 'Reset path to contact' },
    { cmd: 'disc_path <name>', desc: 'Discover path to contact' },
    { group: 'Info' },
    { cmd: 'stats', desc: 'Message statistics' },
    { cmd: 'clock', desc: 'Show current time' },
    { cmd: 'ver', desc: 'Version info' },
  ];

  const REPEATER_CMDS = [
    { group: 'Discovery' },
    { cmd: 'neighbors', desc: 'List neighbors' },
    { cmd: 'neighbor.remove <hex>', desc: 'Remove neighbor' },
    { cmd: 'advert', desc: 'Send advertisement' },
    { cmd: 'advert.zerohop', desc: 'Advert (direct only)' },
    { cmd: 'discover.neighbors', desc: 'Explicit neighbor discovery' },
    { group: 'Statistics' },
    { cmd: 'stats-core', desc: 'Core mesh stats' },
    { cmd: 'stats-radio', desc: 'Radio stats' },
    { cmd: 'stats-packets', desc: 'Packet stats' },
    { cmd: 'clear stats', desc: 'Reset counters' },
    { group: 'Get Config' },
    { cmd: 'get name', desc: 'Node name' },
    { cmd: 'get radio', desc: 'Radio params' },
    { cmd: 'get repeat', desc: 'Forward on/off' },
    { cmd: 'get af', desc: 'Airtime factor' },
    { cmd: 'get rxdelay', desc: 'RX delay base' },
    { cmd: 'get txdelay', desc: 'TX delay factor' },
    { cmd: 'get flood.max', desc: 'Flood max' },
    { cmd: 'get loop.detect', desc: 'Loop detection mode' },
    { cmd: 'get lat', desc: 'Latitude' },
    { cmd: 'get lon', desc: 'Longitude' },
    { group: 'Set Config' },
    { cmd: 'set name <name>', desc: 'Set node name' },
    { cmd: 'set repeat on|off', desc: 'Enable/disable forward' },
    { cmd: 'set af <val>', desc: 'Set airtime factor' },
    { cmd: 'set rxdelay <sec>', desc: 'Set RX delay base' },
    { cmd: 'set txdelay <val>', desc: 'Set TX delay factor' },
    { cmd: 'set flood.max <n>', desc: 'Set flood max (0-64)' },
    { cmd: 'set loop.detect <mode>', desc: 'off|minimal|moderate|strict' },
    { group: 'Info' },
    { cmd: 'clock', desc: 'Show current time' },
    { cmd: 'ver', desc: 'Version info' },
  ];

  let _cmdPopOpen = null;

  function showCmdHelp(btnId, cmds) {
    closeCmdHelp();
    const anchor = document.getElementById(btnId).parentElement;
    const pop = document.createElement('div');
    pop.className = 'cmd-help-pop';
    pop.id = 'cmd-help-pop';

    for (const item of cmds) {
      if (item.group) {
        const g = document.createElement('div');
        g.className = 'cmd-group';
        g.textContent = item.group;
        pop.appendChild(g);
      } else {
        const d = document.createElement('div');
        d.className = 'cmd-item';
        d.innerHTML = '<span class="cmd-name">' + escapeHtml(item.cmd.split(' ')[0]) + '</span><span class="cmd-desc">' + escapeHtml(item.desc) + '</span>';
        d.addEventListener('click', () => {
          document.getElementById('cmd-input').value = item.cmd;
          document.getElementById('cmd-input').focus();
          closeCmdHelp();
        });
        pop.appendChild(d);
      }
    }

    anchor.appendChild(pop);
    _cmdPopOpen = true;
    setTimeout(() => document.addEventListener('click', _cmdHelpOutsideClick), 0);
  }

  function _cmdHelpOutsideClick(e) {
    const pop = document.getElementById('cmd-help-pop');
    if (pop && !pop.contains(e.target) && e.target.id !== 'btn-companion-cmds' && e.target.id !== 'btn-repeater-cmds') {
      closeCmdHelp();
    }
  }

  function closeCmdHelp() {
    _cmdPopOpen = false;
    const pop = document.getElementById('cmd-help-pop');
    if (pop) pop.remove();
    document.removeEventListener('click', _cmdHelpOutsideClick);
  }

  document.getElementById('btn-companion-cmds').addEventListener('click', (e) => {
    e.stopPropagation();
    if (_cmdPopOpen) { closeCmdHelp(); return; }
    showCmdHelp('btn-companion-cmds', COMPANION_CMDS);
  });

  document.getElementById('btn-repeater-cmds').addEventListener('click', (e) => {
    e.stopPropagation();
    if (_cmdPopOpen) { closeCmdHelp(); return; }
    showCmdHelp('btn-repeater-cmds', REPEATER_CMDS);
  });

  // ── Post-session actions ────────────────────────────
  document.getElementById('btn-export').addEventListener('click', async function() {
    this.disabled = true;
    try {
      const result = await postJSON('/api/interactive/' + sessionId + '/export', {});
      const simId = result.sim_id;
      addSystemEvent('Exported as simulation: ' + simId);
      const viewBtn = document.getElementById('btn-view-timeline');
      viewBtn.style.display = '';
      viewBtn.onclick = () => {
        window.location.href = '/static/visualize.html?sim=' + encodeURIComponent(simId);
      };
    } catch (e) {
      addSystemEvent('Export failed: ' + e.message);
      this.disabled = false;
    }
  });

  function disableControls() {
    document.getElementById('btn-step').disabled = true;
    document.getElementById('btn-next').disabled = true;
    document.getElementById('btn-run-all').disabled = true;
    document.getElementById('btn-summary').disabled = true;
    document.getElementById('btn-send-cmd').disabled = true;
    document.getElementById('cmd-bar').style.opacity = '0.5';
  }

  // ── Visualization iframe ────────────────────────────
  let vizIframeLoaded = false;
  function initVizIframe() {
    if (vizIframeLoaded) return;
    vizIframeLoaded = true;
    const iframe = document.getElementById('viz-iframe');
    iframe.src = '/static/visualize.html?interactive=' + encodeURIComponent(sessionId);
  }

  // ── Resize handle ──────────────────────────────────
  (function setupResize() {
    const handle = document.getElementById('resize-handle');
    const vizWrap = document.getElementById('viz-wrap');
    const eventsPanel = document.getElementById('events-panel');
    let startY, startVizH, startEvtH;

    handle.addEventListener('mousedown', e => {
      e.preventDefault();
      startY = e.clientY;
      startVizH = vizWrap.offsetHeight;
      startEvtH = eventsPanel.offsetHeight;
      handle.classList.add('active');
      document.addEventListener('mousemove', onDrag);
      document.addEventListener('mouseup', onUp);
    });

    function onDrag(e) {
      const dy = e.clientY - startY;
      const newVizH = Math.max(150, startVizH + dy);
      const newEvtH = Math.max(60, startEvtH - dy);
      vizWrap.style.flex = 'none';
      vizWrap.style.height = newVizH + 'px';
      eventsPanel.style.height = newEvtH + 'px';
    }

    function onUp() {
      handle.classList.remove('active');
      document.removeEventListener('mousemove', onDrag);
      document.removeEventListener('mouseup', onUp);
      // Save ratio to localStorage
      try {
        localStorage.setItem('ia-viz-ratio', vizWrap.offsetHeight / (vizWrap.offsetHeight + eventsPanel.offsetHeight));
      } catch (e) {}
    }

    // Restore saved ratio
    try {
      const saved = parseFloat(localStorage.getItem('ia-viz-ratio'));
      if (saved && saved > 0.1 && saved < 0.95) {
        const center = document.querySelector('.ia-center');
        // Wait for layout to be ready
        requestAnimationFrame(() => {
          const available = center.offsetHeight - document.querySelector('.ia-topbar').offsetHeight
            - handle.offsetHeight - document.querySelector('.ia-post').offsetHeight
            - document.querySelector('.ia-cmdbar').offsetHeight;
          if (available > 0) {
            vizWrap.style.flex = 'none';
            vizWrap.style.height = Math.round(available * saved) + 'px';
            eventsPanel.style.height = Math.round(available * (1 - saved)) + 'px';
          }
        });
      }
    } catch (e) {}
  })();

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
    if (sessionClosed) return;
    if (e.key === 's' || e.key === 'S') {
      e.preventDefault();
      document.getElementById('btn-step').click();
    } else if (e.key === 'n' || e.key === 'N') {
      e.preventDefault();
      document.getElementById('btn-next').click();
    }
  });
})();
</script>
