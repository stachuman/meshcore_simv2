<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topology Editor - MeshCore Simulator</title>
<link rel="stylesheet" href="/static/css/common.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  .te-layout {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 44px);
    overflow: hidden;
  }

  .te-toolbar {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; background: var(--bg-secondary);
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .te-toolbar input { max-width: 220px; }
  .te-toolbar .name-input { flex: 0 0 200px; }
  .te-toolbar .desc-input { flex: 1; min-width: 0; }
  .te-toolbar .btn-save-dirty {
    border-color: var(--accent);
    box-shadow: 0 0 6px rgba(37,99,235,0.25);
  }
  .te-toolbar .toolbar-gap { width: 8px; flex-shrink: 0; }
  .te-toolbar .btn-danger { color: var(--error); border-color: var(--error); }
  .te-toolbar .btn-danger:hover { background: #fee2e2; }

  /* Split: panel left, map right */
  .te-split {
    flex: 1; display: flex; overflow: hidden;
  }

  /* Left panel */
  .te-panel {
    width: 380px; flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    background: var(--bg-secondary);
  }

  .panel-header {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .panel-header input {
    flex: 1; min-width: 0;
    background: var(--bg-input); color: var(--text);
    border: 1px solid var(--border-light);
    padding: 4px 8px; font-size: 11px; font-family: var(--font-mono);
    border-radius: var(--radius);
  }
  .panel-header input:focus { outline: none; border-color: var(--accent); }
  .panel-header .icon-btn {
    background: none; border: 1px solid var(--border-light);
    border-radius: var(--radius); cursor: pointer;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: var(--text-muted); flex-shrink: 0;
  }
  .panel-header .icon-btn:hover { border-color: var(--accent); color: var(--text); }

  /* Node list */
  .node-list {
    flex: 1; overflow-y: auto; min-height: 80px;
  }
  .node-item {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 10px; cursor: pointer;
    border-bottom: 1px solid var(--border-light);
    font-size: 12px;
  }
  .node-item:hover { background: rgba(37,99,235,0.06); }
  .node-item.selected { background: rgba(37,99,235,0.10); border-left: 3px solid var(--accent); padding-left: 7px; }
  .node-item .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .node-item .name { flex: 1; font-family: var(--font-mono); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .node-item .meta { font-size: 10px; color: var(--text-muted); white-space: nowrap; }

  /* Detail section */
  .node-detail {
    border-top: 1px solid var(--border);
    overflow-y: auto;
    overflow-x: hidden;
    flex-shrink: 0;
    max-height: 55%;
  }
  .detail-section {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border-light);
  }
  .detail-section:last-child { border-bottom: none; }
  .detail-section h4 {
    font-size: 10px; color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 6px; font-weight: 600;
  }
  .detail-field {
    display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
  }
  .detail-field label {
    font-size: 10px; color: var(--text-dim); min-width: 52px; flex-shrink: 0;
  }
  .detail-field input, .detail-field select {
    flex: 1; min-width: 0;
    background: var(--bg-input); color: var(--text);
    border: 1px solid var(--border-light);
    padding: 3px 6px; font-size: 11px; font-family: var(--font-mono);
    border-radius: var(--radius);
  }
  .detail-field input:focus, .detail-field select:focus {
    outline: none; border-color: var(--accent);
  }

  /* Link rows in detail */
  .link-row {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 0; border-bottom: 1px solid var(--border-light);
    font-size: 11px; cursor: pointer;
    border-radius: var(--radius);
  }
  .link-row:hover { background: rgba(37,99,235,0.06); }
  .link-row:last-child { border-bottom: none; }
  .link-row .peer-name {
    flex: 1; font-family: var(--font-mono); cursor: pointer; color: var(--accent);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .link-row .peer-name:hover { text-decoration: underline; }
  .link-row .snr-val { width: 55px; text-align: right; font-family: var(--font-mono); }
  .link-row .loss-val { width: 45px; text-align: right; color: var(--text-muted); font-family: var(--font-mono); }
  .link-row .edit-hint {
    font-size: 10px; color: var(--text-dim); flex-shrink: 0;
    opacity: 0; transition: opacity 0.15s;
  }
  .link-row:hover .edit-hint { opacity: 1; }
  .link-row .del-btn {
    background: none; border: none; color: var(--error); cursor: pointer;
    font-size: 14px; padding: 0 4px; flex-shrink: 0;
  }
  .link-row .del-btn:hover { color: #ef4444; }

  /* Expanded link edit */
  .link-expanded {
    padding: 8px; margin: 2px 0;
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    background: rgba(37,99,235,0.03);
    overflow: hidden;
  }
  .link-expanded .link-exp-header {
    display: flex; align-items: center; gap: 6px; margin-bottom: 6px; font-size: 11px;
  }
  .link-expanded .link-exp-header .peer-name {
    flex: 1; font-family: var(--font-mono); cursor: pointer; color: var(--accent);
  }
  .link-expanded .link-exp-header .peer-name:hover { text-decoration: underline; }
  .link-expanded .link-exp-fields {
    display: grid; grid-template-columns: 1fr 1fr; gap: 4px 8px;
    overflow: hidden;
  }
  .link-expanded .link-exp-fields .detail-field { margin-bottom: 0; overflow: hidden; }
  .link-expanded .link-exp-fields .detail-field label { min-width: 40px; max-width: 40px; font-size: 9px; }
  .link-expanded .link-exp-fields .detail-field input { min-width: 0; width: 100%; }
  .link-expanded .link-exp-actions {
    display: flex; gap: 6px; justify-content: flex-end; margin-top: 8px;
  }

  .add-link-row {
    display: flex; align-items: center; gap: 6px; padding: 6px 0;
  }
  .add-link-row select {
    flex: 1; min-width: 0;
    background: var(--bg-input); color: var(--text);
    border: 1px solid var(--border-light);
    padding: 3px 6px; font-size: 11px; font-family: var(--font-mono);
    border-radius: var(--radius);
  }

  /* Panel footer */
  .panel-footer {
    padding: 8px 12px;
    border-top: 1px solid var(--border);
    font-size: 10px; color: var(--text-muted);
    flex-shrink: 0;
    display: flex; justify-content: space-between;
  }

  /* Map */
  .te-map {
    flex: 1; display: flex; flex-direction: column;
    min-width: 0; background: var(--bg-primary);
  }
  .te-map .map-header {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 12px;
    background: var(--bg-secondary); border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .te-map .map-header label {
    font-size: 10px; color: var(--text-muted); display: flex;
    align-items: center; gap: 4px; cursor: pointer;
  }
  #map-preview { flex: 1; min-height: 0; }
  .leaflet-container { background: #f5f5f8 !important; }
  .link-label { background: none !important; border: none !important; box-shadow: none !important; font-size: 10px; color: #4b5563; font-family: var(--font-mono); white-space: nowrap; }

  /* Status */
  #te-status {
    padding: 8px 12px; font-size: 11px; background: var(--bg-secondary);
    border-top: 1px solid var(--border); flex-shrink: 0;
  }

  /* Settings popover */
  .settings-popover {
    position: absolute; top: 100%; right: 0;
    width: 300px; z-index: 200;
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    padding: 12px;
  }
  .settings-popover .section { margin-bottom: 12px; }
  .settings-popover .section:last-child { margin-bottom: 0; }
  .settings-popover .section h4 {
    font-size: 10px; color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 6px; font-weight: 600;
  }
  .settings-popover .radio-row {
    display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
  }
  .settings-popover .radio-row label {
    font-size: 10px; color: var(--text-dim); min-width: 28px;
  }
  .settings-popover .radio-row select,
  .settings-popover .radio-row input { flex: 1; font-size: 11px; }
  .settings-popover .btn { width: 100%; justify-content: center; margin-bottom: 4px; }
  .settings-popover .btn:last-child { margin-bottom: 0; }
  .settings-anchor { position: relative; }

  /* Generate grid modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.3);
    display: flex; align-items: center; justify-content: center; z-index: 1000;
  }
  .modal-dialog {
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 24px; max-width: 420px; width: 90%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
  }
  .modal-dialog h3 { margin-bottom: 12px; }
  .modal-dialog .btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .gen-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .gen-grid label { font-size: 11px; color: var(--text-muted); display: block; margin-bottom: 2px; }
</style>
</head>
<body>

<nav class="navbar">
  <span class="brand">MeshCore Sim</span>
  <ul class="nav-links">
    <li><a href="/static/index.html">Dashboard</a></li>
    <li><a href="/static/simulations.html">Simulations</a></li>
    <li><a href="/static/topologies.html" class="active">Topologies</a></li>
    <li><a href="/static/scenarios.html">Scenarios</a></li>
  </ul>
  <span class="spacer"></span>
</nav>

<div class="te-layout">
  <div class="te-toolbar">
    <input id="topo-name" class="form-input name-input" type="text" placeholder="Topology name...">
    <input id="topo-desc" class="form-input desc-input" type="text" placeholder="Description (optional)">
    <button class="btn btn-success" id="btn-save">Save</button>
    <div class="toolbar-gap"></div>
    <button class="btn btn-sm" id="btn-save-copy" title="Save as new topology" disabled>Save Copy</button>
    <button class="btn btn-sm" id="btn-download" title="Download as JSON">Download</button>
    <button class="btn btn-sm btn-danger" id="btn-delete" title="Delete topology" style="display:none">Delete</button>
  </div>

  <div class="te-split">
    <!-- Left panel: list + detail -->
    <div class="te-panel">
      <div class="panel-header">
        <input id="node-search" type="text" placeholder="Search nodes...">
        <button class="icon-btn" id="btn-add-node" title="Add node">+</button>
        <div class="settings-anchor">
          <button class="icon-btn" id="btn-settings" title="Settings">&#9881;</button>
        </div>
      </div>

      <div class="node-list" id="node-list"></div>

      <div class="node-detail" id="node-detail" style="display:none">
        <div class="detail-section" id="detail-props"></div>
        <div class="detail-section" id="detail-links"></div>
      </div>

      <div class="panel-footer" id="panel-footer">
        <span id="footer-stats">Nodes: 0  Links: 0</span>
        <span id="footer-radio"></span>
      </div>
    </div>

    <!-- Map (fills remaining space) -->
    <div class="te-map">
      <div class="map-header">
        <label><input type="checkbox" id="map-labels"> Labels</label>
        <label><input type="checkbox" id="map-snr-colors" checked> SNR colors</label>
      </div>
      <div id="map-preview"></div>
    </div>
  </div>

  <div id="te-status">Ready</div>
</div>

<div id="modal-container" style="display:none"></div>
<input type="file" id="import-file" accept=".json" style="display:none">

<script src="/static/js/api.js"></script>
<script>
(function() {
  let topoId = new URLSearchParams(window.location.search).get('id');
  let leafletMap = null;
  let canvasRenderer = null;
  let markerGroup = null;
  let lineGroup = null;
  let labelGroup = null;

  // -- Node/Link data ------------------------------------------------
  let nodes = [];
  let links = [];
  let isDirty = false;

  // -- Selection state -----------------------------------------------
  let selectedNodeIdx = null;
  let searchFilter = '';
  let expandedLinkIdx = null;  // index into links[] for expanded edit

  // -- Settings popover state ----------------------------------------
  let settingsOpen = false;

  // -- Firmware plugins cache ----------------------------------------
  let _firmwarePlugins = [];

  function _firmwareOptionsHtml(selected) {
    let html = '<option value=""' + (selected === '' ? ' selected' : '') + '>(default)</option>';
    for (const name of _firmwarePlugins) {
      if (name === 'fw_default') continue;
      html += '<option value="' + name + '"' + (selected === name ? ' selected' : '') + '>' + name + '</option>';
    }
    return html;
  }

  async function loadFirmwarePlugins() {
    try {
      const data = await fetchJSON('/api/firmware');
      _firmwarePlugins = data.plugins || [];
    } catch (_) {}
  }

  function markDirty() {
    isDirty = true;
    const btn = document.getElementById('btn-save');
    btn.textContent = 'Save *';
    btn.classList.add('btn-save-dirty');
  }

  function markClean() {
    isDirty = false;
    const btn = document.getElementById('btn-save');
    btn.textContent = 'Save';
    btn.classList.remove('btn-save-dirty');
  }

  // -- Ctrl+S / Cmd+S shortcut --------------------------------------
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      document.getElementById('btn-save').click();
    }
    // Escape deselects
    if (e.key === 'Escape') {
      if (settingsOpen) closeSettings();
      else deselectNode();
    }
  });

  // -- Unsaved changes guard ----------------------------------------
  window.addEventListener('beforeunload', (e) => {
    if (isDirty) e.preventDefault();
  });

  function getNodeNames() {
    return nodes.map(n => n.name).filter(Boolean).sort((a, b) => a.localeCompare(b));
  }

  // -- Debounced map update ------------------------------------------
  let _mapTimer = null;
  function debouncedMapUpdate() {
    if (_mapTimer) clearTimeout(_mapTimer);
    _mapTimer = setTimeout(updateMap, 200);
  }

  // -- Selection functions -------------------------------------------
  function selectNode(idx) {
    if (idx < 0 || idx >= nodes.length) return;
    selectedNodeIdx = idx;
    expandedLinkIdx = null;
    renderNodeList();
    renderDetail();
    highlightOnMap();
    scrollNodeListToSelected();
  }

  function deselectNode() {
    if (selectedNodeIdx === null) return;
    selectedNodeIdx = null;
    expandedLinkIdx = null;
    renderNodeList();
    renderDetail();
    highlightOnMap();
  }

  function scrollNodeListToSelected() {
    if (selectedNodeIdx === null) return;
    const container = document.getElementById('node-list');
    const items = container.querySelectorAll('.node-item');
    // Find the item with matching index
    for (const item of items) {
      if (parseInt(item.dataset.idx) === selectedNodeIdx) {
        item.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        break;
      }
    }
  }

  // -- Node list rendering -------------------------------------------
  function renderNodeList() {
    const container = document.getElementById('node-list');
    container.innerHTML = '';

    // Build link count per node
    const linkCount = {};
    for (const l of links) {
      linkCount[l.from] = (linkCount[l.from] || 0) + 1;
      linkCount[l.to] = (linkCount[l.to] || 0) + 1;
    }

    const filter = searchFilter.toLowerCase();

    // Build sorted index array for display
    const sortedIndices = nodes.map((_, i) => i);
    sortedIndices.sort((a, b) => (nodes[a].name || '').localeCompare(nodes[b].name || ''));

    for (const idx of sortedIndices) {
      const node = nodes[idx];
      if (filter && !node.name.toLowerCase().includes(filter)) continue;

      const div = document.createElement('div');
      div.className = 'node-item' + (idx === selectedNodeIdx ? ' selected' : '');
      div.dataset.idx = idx;
      const color = node.role === 'companion' ? '#16a34a' : '#2563eb';
      const count = linkCount[node.name] || 0;

      div.innerHTML =
        '<span class="dot" style="background:' + color + '"></span>' +
        '<span class="name">' + esc(node.name) + '</span>' +
        '<span class="meta">' + node.role + '</span>' +
        '<span class="meta">' + count + ' lnk</span>';
      div.addEventListener('click', () => selectNode(idx));
      container.appendChild(div);
    }

    updateFooter();
  }

  // -- Detail panel rendering ----------------------------------------
  function renderDetail() {
    const panel = document.getElementById('node-detail');
    const propsDiv = document.getElementById('detail-props');
    const linksDiv = document.getElementById('detail-links');

    if (selectedNodeIdx === null || selectedNodeIdx >= nodes.length) {
      panel.style.display = 'none';
      return;
    }
    panel.style.display = '';

    const node = nodes[selectedNodeIdx];

    // --- Node properties ---
    propsDiv.innerHTML =
      '<h4>Selected: ' + esc(node.name) + '</h4>' +
      '<div class="detail-field">' +
        '<label>Name</label>' +
        '<input id="det-name" value="' + esc(node.name || '') + '">' +
      '</div>' +
      '<div class="detail-field">' +
        '<label>Role</label>' +
        '<select id="det-role">' +
          '<option value="repeater"' + (node.role === 'repeater' ? ' selected' : '') + '>repeater</option>' +
          '<option value="companion"' + (node.role === 'companion' ? ' selected' : '') + '>companion</option>' +
        '</select>' +
      '</div>' +
      '<div class="detail-field">' +
        '<label>Lat</label>' +
        '<input id="det-lat" type="number" step="any" value="' + (node.lat ?? '') + '">' +
      '</div>' +
      '<div class="detail-field">' +
        '<label>Lon</label>' +
        '<input id="det-lon" type="number" step="any" value="' + (node.lon ?? '') + '">' +
      '</div>' +
      '<div class="detail-field">' +
        '<label>Contact</label>' +
        '<input id="det-contact" value="' + esc(node.contact || '') + '">' +
      '</div>' +
      '<div class="detail-field">' +
        '<label>Firmware</label>' +
        '<select id="det-firmware">' +
          _firmwareOptionsHtml(node.firmware || '') +
        '</select>' +
      '</div>' +
      '<div style="margin-top:8px">' +
        '<button class="btn btn-sm btn-danger" id="det-delete-node">Delete Node</button>' +
      '</div>';

    // Bind property change events
    const bindField = (id, field, parser) => {
      const el = propsDiv.querySelector('#' + id);
      if (!el) return;
      el.addEventListener('change', () => {
        const idx = selectedNodeIdx;
        if (idx === null) return;
        let val = el.value;
        if (parser) val = parser(val);
        const oldVal = nodes[idx][field];
        nodes[idx][field] = val;
        if (field === 'name') {
          // Update link references
          for (const l of links) {
            if (l.from === oldVal) l.from = val;
            if (l.to === oldVal) l.to = val;
          }
        }
        markDirty();
        renderNodeList();
        if (field === 'name') renderDetail();
        debouncedMapUpdate();
      });
    };
    bindField('det-name', 'name');
    bindField('det-role', 'role');
    bindField('det-lat', 'lat', v => v === '' ? undefined : parseFloat(v));
    bindField('det-lon', 'lon', v => v === '' ? undefined : parseFloat(v));
    bindField('det-contact', 'contact');
    bindField('det-firmware', 'firmware', v => v === '' ? undefined : v);

    propsDiv.querySelector('#det-delete-node').addEventListener('click', () => {
      if (!confirm('Delete node "' + node.name + '"?')) return;
      const name = nodes[selectedNodeIdx].name;
      nodes.splice(selectedNodeIdx, 1);
      // Remove links referencing this node
      links = links.filter(l => l.from !== name && l.to !== name);
      selectedNodeIdx = null;
      expandedLinkIdx = null;
      markDirty();
      renderNodeList();
      renderDetail();
      updateMap();
    });

    // --- Connected links ---
    const nodeLinks = [];
    links.forEach((l, li) => {
      if (l.from === node.name || l.to === node.name) {
        const peer = l.from === node.name ? l.to : l.from;
        nodeLinks.push({ link: l, linkIdx: li, peer });
      }
    });
    nodeLinks.sort((a, b) => a.peer.localeCompare(b.peer));

    let linksHtml = '<h4>Links (' + nodeLinks.length + ')</h4>';

    for (const { link, linkIdx, peer } of nodeLinks) {
      if (expandedLinkIdx === linkIdx) {
        // Expanded view
        linksHtml += '<div class="link-expanded" data-lidx="' + linkIdx + '">' +
          '<div class="link-exp-header">' +
            '<span class="peer-name" data-peer="' + esc(peer) + '">' + esc(peer) + '</span>' +
          '</div>' +
          '<div class="link-exp-fields">' +
            '<div class="detail-field"><label>SNR</label><input data-lidx="' + linkIdx + '" data-lf="snr" type="number" step="any" value="' + (link.snr ?? 0) + '"></div>' +
            '<div class="detail-field"><label>RSSI</label><input data-lidx="' + linkIdx + '" data-lf="rssi" type="number" step="any" value="' + (link.rssi ?? -80) + '"></div>' +
            '<div class="detail-field"><label>Loss</label><input data-lidx="' + linkIdx + '" data-lf="loss" type="number" step="0.01" min="0" max="1" value="' + (link.loss ?? '') + '"></div>' +
            '<div class="detail-field"><label>StdDev</label><input data-lidx="' + linkIdx + '" data-lf="snr_std_dev" type="number" step="0.1" value="' + (link.snr_std_dev ?? '') + '"></div>' +
            '<div class="detail-field"><label>Bidir</label><input data-lidx="' + linkIdx + '" data-lf="bidir" type="checkbox"' + (link.bidir ? ' checked' : '') + '></div>' +
          '</div>' +
          '<div class="link-exp-actions">' +
            '<button class="btn btn-sm btn-danger" data-action="delete" data-lidx="' + linkIdx + '">Delete</button>' +
            '<button class="btn btn-sm" data-action="done" data-lidx="' + linkIdx + '">Done</button>' +
          '</div>' +
        '</div>';
      } else {
        // Collapsed view — click row to expand into edit mode
        const snrStr = (link.snr ?? 0).toFixed(1);
        const lossStr = link.loss != null ? link.loss.toFixed(2) : '0';
        linksHtml += '<div class="link-row" data-lidx="' + linkIdx + '">' +
          '<span class="peer-name" data-peer="' + esc(peer) + '">' + esc(peer) + '</span>' +
          '<span class="snr-val">' + snrStr + ' dB</span>' +
          '<span class="loss-val">' + lossStr + '</span>' +
          '<span class="edit-hint">edit</span>' +
          '<button class="del-btn" data-lidx="' + linkIdx + '" title="Delete link">&times;</button>' +
        '</div>';
      }
    }

    // Add link UI
    const available = nodes.filter(n => n.name !== node.name && !nodeLinks.some(nl => nl.peer === n.name))
      .sort((a, b) => (a.name || '').localeCompare(b.name || ''));
    if (available.length > 0) {
      linksHtml += '<div class="add-link-row">' +
        '<select id="add-link-target">' +
        available.map(n => '<option value="' + esc(n.name) + '">' + esc(n.name) + '</option>').join('') +
        '</select>' +
        '<button class="btn btn-sm" id="btn-add-link-sel">+ Link</button>' +
      '</div>';
    } else if (nodes.length > 1) {
      linksHtml += '<div style="font-size:10px;color:var(--text-dim);padding:4px 0;">All nodes already linked</div>';
    }

    linksDiv.innerHTML = linksHtml;

    // Bind link events
    linksDiv.querySelectorAll('.peer-name').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        const peerName = el.dataset.peer;
        const peerIdx = nodes.findIndex(n => n.name === peerName);
        if (peerIdx >= 0) selectNode(peerIdx);
      });
    });

    // Click on collapsed link row to expand
    linksDiv.querySelectorAll('.link-row').forEach(el => {
      el.addEventListener('click', (e) => {
        if (e.target.classList.contains('peer-name') || e.target.classList.contains('del-btn')) return;
        expandedLinkIdx = parseInt(el.dataset.lidx);
        renderDetail();
      });
    });

    // Expanded link field changes (live update as you type)
    linksDiv.querySelectorAll('.link-exp-fields input').forEach(el => {
      el.addEventListener('change', () => {
        const lidx = parseInt(el.dataset.lidx);
        const field = el.dataset.lf;
        if (field === 'bidir') {
          links[lidx].bidir = el.checked;
        } else if (['snr', 'rssi', 'loss', 'snr_std_dev'].includes(field)) {
          links[lidx][field] = el.value === '' ? undefined : parseFloat(el.value);
          if (field === 'snr' && links[lidx].snr != null) {
            links[lidx].rssi = rssiFromSnr(links[lidx].snr);
            const rssiInput = linksDiv.querySelector('input[data-lidx="' + lidx + '"][data-lf="rssi"]');
            if (rssiInput) rssiInput.value = links[lidx].rssi;
          }
        }
        markDirty();
        debouncedMapUpdate();
      });
    });

    // Expanded action buttons (Done / Delete)
    linksDiv.querySelectorAll('.link-exp-actions button').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        const lidx = parseInt(el.dataset.lidx);
        const action = el.dataset.action;
        if (action === 'delete') {
          links.splice(lidx, 1);
          expandedLinkIdx = null;
          markDirty();
          renderNodeList();
          renderDetail();
          updateMap();
        } else if (action === 'done') {
          expandedLinkIdx = null;
          renderDetail();
        }
      });
    });

    // Collapsed row delete buttons
    linksDiv.querySelectorAll('.link-row .del-btn').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        const lidx = parseInt(el.dataset.lidx);
        links.splice(lidx, 1);
        expandedLinkIdx = null;
        markDirty();
        renderNodeList();
        renderDetail();
        updateMap();
      });
    });

    // Add link button
    const addLinkBtn = linksDiv.querySelector('#btn-add-link-sel');
    if (addLinkBtn) {
      addLinkBtn.addEventListener('click', () => {
        const target = linksDiv.querySelector('#add-link-target').value;
        if (!target) return;
        const fromNode = node;
        const toNode = nodes.find(n => n.name === target);
        const est = fromNode && toNode ? estimateLinkParams(fromNode, toNode) : null;
        links.push({
          from: node.name, to: target,
          snr: est ? est.snr : 5,
          rssi: est ? est.rssi : rssiFromSnr(5),
          loss: est ? est.loss : undefined,
          bidir: true,
        });
        markDirty();
        renderNodeList();
        renderDetail();
        updateMap();
      });
    }
  }

  // Radio state stored outside popover so it persists
  let _radioSf = '12', _radioBw = '125000', _radioCr = '1';
  let _originLat = 54.35, _originLon = 18.65;

  function getOrigin() {
    return { lat: _originLat, lon: _originLon };
  }

  function setOriginFromCentroid() {
    const geo = nodes.filter(n => n.lat != null && n.lon != null);
    if (!geo.length) return;
    _originLat = parseFloat((geo.reduce((s, n) => s + n.lat, 0) / geo.length).toFixed(6));
    _originLon = parseFloat((geo.reduce((s, n) => s + n.lon, 0) / geo.length).toFixed(6));
  }

    e.stopPropagation();
    openSettings();
  });

  // -- Map -----------------------------------------------------------
  function initMap() {
    leafletMap = L.map('map-preview', { zoomControl: true, attributionControl: false });
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(leafletMap);
    canvasRenderer = L.canvas({ padding: 0.5 });
    markerGroup = L.featureGroup().addTo(leafletMap);
    lineGroup = L.featureGroup().addTo(leafletMap);
    labelGroup = L.featureGroup().addTo(leafletMap);
    const o = getOrigin();
    leafletMap.setView([o.lat, o.lon], 13);

    // Click on map background deselects
    leafletMap.on('click', () => deselectNode());
  }

  function snrColor(snr) {
    if (snr < 0) return '#ef4444';   // red
    if (snr < 5) return '#f59e0b';   // yellow
    return '#22c55e';                  // green
  }

  function updateMap() {
    if (!leafletMap) initMap();

    markerGroup.clearLayers();
    lineGroup.clearLayers();
    labelGroup.clearLayers();

    const bounds = L.latLngBounds();
    const showLabels = document.getElementById('map-labels').checked;
    const showSnrColors = document.getElementById('map-snr-colors').checked;

    // Build node positions for links
    const nodePos = {};
    nodes.forEach(n => {
      if (n.lat != null && n.lon != null) nodePos[n.name] = L.latLng(n.lat, n.lon);
    });

    // Selected node info for highlighting
    const selName = selectedNodeIdx !== null && selectedNodeIdx < nodes.length ? nodes[selectedNodeIdx].name : null;
    const selLinks = new Set();
    if (selName) {
      links.forEach((l, i) => {
        if (l.from === selName || l.to === selName) selLinks.add(i);
      });
    }

    // Draw links
    const linkLabelsLimit = links.length <= 200;
    links.forEach((link, li) => {
      const from = nodePos[link.from];
      const to = nodePos[link.to];
      if (!from || !to) return;

      const isSelLink = selLinks.has(li);
      const color = showSnrColors ? snrColor(link.snr ?? 0) : '#9ca3af';
      const weight = isSelLink ? 3 : (selName ? 1 : 1.5);
      const opacity = isSelLink ? 0.9 : (selName ? 0.25 : 0.6);

      const line = L.polyline([from, to], {
        renderer: canvasRenderer,
        color, weight, opacity,
      });
      lineGroup.addLayer(line);

      if (showLabels && linkLabelsLimit) {
        const mid = L.latLng((from.lat + to.lat) / 2, (from.lng + to.lng) / 2);
        const snrText = (link.snr ?? 0).toFixed(1) + ' dB';
        const label = L.marker(mid, {
          icon: L.divIcon({ className: 'link-label', html: snrText, iconSize: [50, 14], iconAnchor: [25, 7] }),
          interactive: false,
        });
        labelGroup.addLayer(label);
      }
    });

    // Draw nodes
    nodes.forEach((node, idx) => {
      if (node.lat == null || node.lon == null) return;
      const ll = L.latLng(node.lat, node.lon);
      bounds.extend(ll);

      const isSelected = idx === selectedNodeIdx;
      const baseColor = node.role === 'companion' ? '#16a34a' : '#2563eb';
      const size = isSelected ? 18 : 14;
      const border = isSelected ? '3px solid #f97316' : '2px solid #374151';

      const icon = L.divIcon({
        className: '',
        html: '<div style="width:' + size + 'px;height:' + size + 'px;border-radius:50%;background:' + baseColor + ';border:' + border + ';opacity:0.85;"></div>',
        iconSize: [size, size],
        iconAnchor: [size / 2, size / 2],
      });
      const marker = L.marker(ll, { icon, draggable: true });
      marker.bindTooltip(node.name || '?', { permanent: showLabels, direction: 'top', offset: [0, -10] });
      marker._nodeIdx = idx;

      marker.on('click', function(e) {
        L.DomEvent.stopPropagation(e);
        selectNode(this._nodeIdx);
      });

      marker.on('dragend', function() {
        const pos = this.getLatLng();
        const i = this._nodeIdx;
        nodes[i].lat = parseFloat(pos.lat.toFixed(6));
        nodes[i].lon = parseFloat(pos.lng.toFixed(6));
        markDirty();
        if (selectedNodeIdx === i) renderDetail();
        redrawLinks();
      });

      markerGroup.addLayer(marker);
    });

    if (bounds.isValid()) {
      leafletMap.fitBounds(bounds, { padding: [30, 30] });
    } else {
      const o = getOrigin();
      leafletMap.setView([o.lat, o.lon], 13);
    }
  }

  function redrawLinks() {
    lineGroup.clearLayers();
    labelGroup.clearLayers();

    const nodePos = {};
    nodes.forEach(n => {
      if (n.lat != null && n.lon != null) nodePos[n.name] = L.latLng(n.lat, n.lon);
    });

    const showLabels = document.getElementById('map-labels').checked;
    const showSnrColors = document.getElementById('map-snr-colors').checked;
    const linkLabelsLimit = links.length <= 200;

    const selName = selectedNodeIdx !== null && selectedNodeIdx < nodes.length ? nodes[selectedNodeIdx].name : null;
    const selLinks = new Set();
    if (selName) {
      links.forEach((l, i) => {
        if (l.from === selName || l.to === selName) selLinks.add(i);
      });
    }

    links.forEach((link, li) => {
      const from = nodePos[link.from];
      const to = nodePos[link.to];
      if (!from || !to) return;

      const isSelLink = selLinks.has(li);
      const color = showSnrColors ? snrColor(link.snr ?? 0) : '#9ca3af';
      const weight = isSelLink ? 3 : (selName ? 1 : 1.5);
      const opacity = isSelLink ? 0.9 : (selName ? 0.25 : 0.6);

      const line = L.polyline([from, to], {
        renderer: canvasRenderer,
        color, weight, opacity,
      });
      lineGroup.addLayer(line);

      if (showLabels && linkLabelsLimit) {
        const mid = L.latLng((from.lat + to.lat) / 2, (from.lng + to.lng) / 2);
        const snrText = (link.snr ?? 0).toFixed(1) + ' dB';
        const label = L.marker(mid, {
          icon: L.divIcon({ className: 'link-label', html: snrText, iconSize: [50, 14], iconAnchor: [25, 7] }),
          interactive: false,
        });
        labelGroup.addLayer(label);
      }
    });
  }

  function highlightOnMap() {
    // Full redraw to update marker styles + link weights
    updateMap();
  }

  // -- Search --------------------------------------------------------
  document.getElementById('node-search').addEventListener('input', (e) => {
    searchFilter = e.target.value;
    renderNodeList();
  });

  // -- Map toggles ---------------------------------------------------
  document.getElementById('map-labels').addEventListener('change', () => updateMap());
  document.getElementById('map-snr-colors').addEventListener('change', () => updateMap());

  // -- Add node ------------------------------------------------------
  document.getElementById('btn-add-node').addEventListener('click', () => {
    const idx = nodes.length + 1;
    const name = nodes.length === 0 ? 'R1' : 'R' + idx;
    // Place at current map center so it's always visible
    let lat, lon;
    if (leafletMap) {
      const center = leafletMap.getCenter();
      lat = parseFloat(center.lat.toFixed(6));
      lon = parseFloat(center.lng.toFixed(6));
    } else {
      const o = getOrigin();
      lat = o.lat;
      lon = o.lon;
    }
    nodes.push({ name, role: 'repeater', lat, lon });
    markDirty();
    renderNodeList();
    updateMap();
    selectNode(nodes.length - 1);
  });

  // -- Save ----------------------------------------------------------
  document.getElementById('btn-save').addEventListener('click', async () => {
    const name = document.getElementById('topo-name').value.trim();
    if (!name) {
      setStatus('Name is required', true);
      return;
    }

    const payload = buildTopoPayload();

    try {
      setStatus('Saving...');
      if (topoId) {
        await putJSON('/api/topologies/' + topoId, payload);
        setStatus('Saved (updated)');
      } else {
        const result = await postJSON('/api/topologies/', payload);
        topoId = result.id;
        history.replaceState(null, '', '?id=' + topoId);
        setStatus('Saved (ID: ' + topoId + ')');
      }
      markClean();
      updateToolbarButtons();
    } catch (err) {
      setStatus('Save failed: ' + err.message, true);
    }
  });

  // -- Save Copy ----------------------------------------------------
  document.getElementById('btn-save-copy').addEventListener('click', async () => {
    if (!topoId) return;
    const payload = buildTopoPayload();
    payload.name = (payload.name || 'Topology') + ' (copy)';
    document.getElementById('topo-name').value = payload.name;

    try {
      setStatus('Saving copy...');
      const result = await postJSON('/api/topologies/', payload);
      topoId = result.id;
      history.replaceState(null, '', '?id=' + topoId);
      markClean();
      updateToolbarButtons();
      setStatus('Copy saved (ID: ' + topoId + ')');
    } catch (err) {
      setStatus('Save copy failed: ' + err.message, true);
    }
  });

  // -- Download -----------------------------------------------------
  document.getElementById('btn-download').addEventListener('click', () => {
    const payload = buildTopoPayload();
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (payload.name || 'topology').replace(/[^a-zA-Z0-9_-]/g, '_') + '.json';
    a.click();
    URL.revokeObjectURL(url);
  });

  // -- Delete -------------------------------------------------------
  document.getElementById('btn-delete').addEventListener('click', async () => {
    if (!topoId) return;
    if (!confirm('Delete this topology? This cannot be undone.')) return;
    try {
      setStatus('Deleting...');
      await deleteJSON('/api/topologies/' + topoId);
      window.location.href = '/static/topologies.html';
    } catch (err) {
      setStatus('Delete failed: ' + err.message, true);
    }
  });

  // -- Import real network -------------------------------------------
  document.getElementById('import-file').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = '';

    try {
      const text = await file.text();
      const topo = JSON.parse(text);

      setStatus('Converting topology...');
      const result = await postJSON('/api/topo/convert', { topology: topo });
      const config = result.config;

      nodes = config.nodes || [];
      links = (config.topology && config.topology.links) || [];
      setRadioFromConfig(config);
      setOriginFromCentroid();

      selectedNodeIdx = null;
      markDirty();
      renderNodeList();
      renderDetail();
      updateMap();
      setStatus('Imported ' + nodes.length + ' nodes, ' + links.length + ' links');
    } catch (err) {
      setStatus('Import failed: ' + err.message, true);
    }
  });

  // -- Generate grid modal -------------------------------------------
  function showGenGridModal() {
    const modal = document.getElementById('modal-container');
    modal.style.display = '';
    modal.innerHTML =
      '<div class="modal-overlay" onclick="this.parentElement.style.display=\'none\'">' +
        '<div class="modal-dialog" onclick="event.stopPropagation()">' +
          '<h3>Generate Grid Topology</h3>' +
          '<div class="gen-grid">' +
            '<div><label>Rows</label><input id="gen-rows" class="form-input" type="number" min="1" value="3"></div>' +
            '<div><label>Cols</label><input id="gen-cols" class="form-input" type="number" min="1" value="3"></div>' +
            '<div><label>Spacing (km)</label><input id="gen-spacing" class="form-input" type="number" step="0.5" value="5.0"></div>' +
            '<div><label>SNR (dB)</label><input id="gen-snr" class="form-input" type="number" step="0.5" value="5.0"></div>' +
            '<div><label>Base Lat</label><input id="gen-lat" class="form-input" type="number" step="any" value="' + _originLat + '"></div>' +
            '<div><label>Base Lon</label><input id="gen-lon" class="form-input" type="number" step="any" value="' + _originLon + '"></div>' +
            '<div><label>Companions</label><input id="gen-comp" class="form-input" type="number" min="0" value="2"></div>' +
          '</div>' +
          '<div class="btn-row">' +
            '<button class="btn" onclick="this.closest(\'.modal-overlay\').parentElement.style.display=\'none\'">Cancel</button>' +
            '<button class="btn btn-primary" id="btn-gen-go">Generate</button>' +
          '</div>' +
        '</div>' +
      '</div>';

    document.getElementById('btn-gen-go').addEventListener('click', async () => {
      const body = {
        rows: parseInt(document.getElementById('gen-rows').value) || 3,
        cols: parseInt(document.getElementById('gen-cols').value) || 3,
        spacing_km: parseFloat(document.getElementById('gen-spacing').value) || 5,
        snr: parseFloat(document.getElementById('gen-snr').value) || 5,
        base_lat: parseFloat(document.getElementById('gen-lat').value) || 54.35,
        base_lon: parseFloat(document.getElementById('gen-lon').value) || 18.65,
        num_companions: parseInt(document.getElementById('gen-comp').value) || 2,
      };

      try {
        modal.style.display = 'none';
        setStatus('Generating grid...');
        const result = await postJSON('/api/topo/generate', body);
        const config = result.config;
        nodes = config.nodes || [];
        links = (config.topology && config.topology.links) || [];
        setRadioFromConfig(config);
        setOriginFromCentroid();
        selectedNodeIdx = null;
        markDirty();
        renderNodeList();
        renderDetail();
        updateMap();
        setStatus('Generated ' + nodes.length + ' nodes, ' + links.length + ' links');
      } catch (err) {
        setStatus('Generation failed: ' + err.message, true);
      }
    });
  }

  // -- From config modal ---------------------------------------------
  async function showFromConfigModal() {
    let configs;
    try {
      configs = await fetchJSON('/api/configs/');
    } catch (e) {
      setStatus('Failed to load configs: ' + e.message, true);
      return;
    }
    if (!configs.length) {
      setStatus('No saved configs to import from.', true);
      return;
    }

    const options = configs.map(c =>
      '<option value="' + c.id + '">' + esc(c.name) + ' (' + c.node_count + ' nodes)</option>'
    ).join('');

    const modal = document.getElementById('modal-container');
    modal.style.display = '';
    modal.innerHTML =
      '<div class="modal-overlay" onclick="this.parentElement.style.display=\'none\'">' +
        '<div class="modal-dialog" onclick="event.stopPropagation()">' +
          '<h3>Import from Config</h3>' +
          '<label class="form-label">Select config:</label>' +
          '<select id="cfg-select" class="form-select">' + options + '</select>' +
          '<div class="btn-row">' +
            '<button class="btn" onclick="this.closest(\'.modal-overlay\').parentElement.style.display=\'none\'">Cancel</button>' +
            '<button class="btn btn-primary" id="btn-cfg-go">Import</button>' +
          '</div>' +
        '</div>' +
      '</div>';

    document.getElementById('btn-cfg-go').addEventListener('click', async () => {
      const cfgId = document.getElementById('cfg-select').value;
      if (!cfgId) return;
      try {
        modal.style.display = 'none';
        setStatus('Loading config...');
        const entry = await fetchJSON('/api/configs/' + cfgId);
        const config = entry.config;
        nodes = config.nodes || [];
        links = (config.topology && config.topology.links) || [];
        setRadioFromConfig(config);
        setOriginFromCentroid();
        if (!document.getElementById('topo-name').value) {
          document.getElementById('topo-name').value = 'Topology from ' + (entry.name || cfgId);
        }
        selectedNodeIdx = null;
        markDirty();
        renderNodeList();
        renderDetail();
        updateMap();
        setStatus('Imported from config: ' + nodes.length + ' nodes, ' + links.length + ' links');
      } catch (err) {
        setStatus('Import failed: ' + err.message, true);
      }
    });
  }

  // -- Helpers -------------------------------------------------------
  function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

  function noiseFloorDbm() {
    const bw = parseInt(_radioBw) || 125000;
    return -174 + 10 * Math.log10(bw) + 6; // thermal + NF
  }

  function rssiFromSnr(snr) {
    return Math.round(snr + noiseFloorDbm());
  }

  const FREQ_MHZ = 869.618;
  const TX_POWER_DBM = 22;
  const LOSS_SNR_MID = -6.0;
  const LOSS_STEEPNESS = 0.8;

  function haversineKm(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat / 2) ** 2 +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLon / 2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  function fsplDb(distKm) {
    if (distKm <= 0) return 0;
    return 32.44 + 20 * Math.log10(distKm) + 20 * Math.log10(FREQ_MHZ);
  }

  function snrToLoss(snr) {
    return Math.round(1 / (1 + Math.exp(LOSS_STEEPNESS * (snr - LOSS_SNR_MID))) * 10000) / 10000;
  }

  function estimateLinkParams(fromNode, toNode) {
    if (fromNode.lat == null || fromNode.lon == null ||
        toNode.lat == null || toNode.lon == null) return null;
    const dist = haversineKm(fromNode.lat, fromNode.lon, toNode.lat, toNode.lon);
    if (dist < 0.001) return null;
    const nf = noiseFloorDbm();
    const snr = Math.round((TX_POWER_DBM - fsplDb(dist) - nf) * 100) / 100;
    const rssi = Math.round(nf + snr);
    const loss = snrToLoss(snr);
    return { snr, rssi, loss: loss > 0.0001 ? loss : undefined, dist_km: Math.round(dist * 1000) / 1000 };
  }

  function setStatus(msg, isError) {
    const el = document.getElementById('te-status');
    el.textContent = msg;
    el.style.color = isError ? 'var(--error)' : 'var(--text-muted)';
  }

  function normalizeCR(cr) {
    if (cr >= 5 && cr <= 8) return cr - 4;
    return cr;
  }

  function setRadioFromConfig(config) {
    const radio = config.simulation?.radio || config.radio || {};
    if (radio.sf) _radioSf = String(radio.sf);
    if (radio.bw) _radioBw = String(radio.bw);
    if (radio.cr) _radioCr = String(normalizeCR(radio.cr));
    updateFooter();
  }

  // -- Toolbar button visibility ------------------------------------
  function updateToolbarButtons() {
    document.getElementById('btn-save-copy').disabled = !topoId;
    document.getElementById('btn-delete').style.display = topoId ? '' : 'none';
  }

  // -- Build topology JSON from current editor state ----------------
  function buildTopoPayload() {
    const name = document.getElementById('topo-name').value.trim();
    const desc = document.getElementById('topo-desc').value.trim();
    const radio = {
      sf: parseInt(_radioSf),
      bw: parseInt(_radioBw),
      cr: parseInt(_radioCr),
    };
    const cleanNodes = nodes.map(n => {
      const clean = { name: n.name, role: n.role || 'repeater' };
      if (n.contact) clean.contact = n.contact;
      if (n.lat != null) clean.lat = n.lat;
      if (n.lon != null) clean.lon = n.lon;
      return clean;
    });
    const cleanLinks = links.map(l => {
      const clean = { from: l.from, to: l.to, snr: l.snr ?? 0 };
      if (l.rssi != null) clean.rssi = l.rssi;
      if (l.loss != null) clean.loss = l.loss;
      if (l.snr_std_dev != null) clean.snr_std_dev = l.snr_std_dev;
      if (l.bidir != null) clean.bidir = l.bidir;
      return clean;
    });
    return { name, description: desc, nodes: cleanNodes, links: cleanLinks, radio };
  }

  // -- Load existing topology ----------------------------------------
  async function loadTopology() {
    if (!topoId) {
      renderNodeList();
      renderDetail();
      updateMap();
      updateToolbarButtons();
      updateFooter();
      return;
    }

    try {
      setStatus('Loading topology...');
      const entry = await fetchJSON('/api/topologies/' + topoId);
      document.getElementById('topo-name').value = entry.name || '';
      document.getElementById('topo-desc').value = entry.description || '';
      nodes = entry.nodes || [];
      links = entry.links || [];
      const radio = entry.radio || {};
      if (radio.sf) _radioSf = String(radio.sf);
      if (radio.bw) _radioBw = String(radio.bw);
      if (radio.cr) _radioCr = String(normalizeCR(radio.cr));
      setOriginFromCentroid();

      renderNodeList();
      renderDetail();
      markClean();
      updateToolbarButtons();
      updateFooter();
      setStatus('Rendering map (' + nodes.length + ' nodes, ' + links.length + ' links)...');
      requestAnimationFrame(() => {
        updateMap();
        setStatus('Loaded: ' + entry.name);
      });
    } catch (err) {
      setStatus('Failed to load topology: ' + err.message, true);
    }
  }

  loadFirmwarePlugins().then(() => loadTopology());
})();
</script>
