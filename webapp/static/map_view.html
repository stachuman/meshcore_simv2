<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MeshCore Topology Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'SF Mono', 'Consolas', 'Menlo', monospace; font-size: 12px; background: #f5f5f8; color: #2a2a3e; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
#toolbar { display: flex; align-items: center; gap: 12px; padding: 6px 12px; background: #ffffff; border-bottom: 1px solid #d1d5db; flex-shrink: 0; z-index: 1000; flex-wrap: wrap; }
#toolbar label { color: #6b7280; font-size: 11px; }
#toolbar select, #toolbar input { background: #e5e7eb; color: #374151; border: 1px solid #d1d5db; padding: 3px 6px; font-size: 11px; font-family: inherit; border-radius: 3px; }
#toolbar .sep { width: 1px; height: 20px; background: #d1d5db; }
#toolbar .info { color: #6b7280; font-size: 11px; }
#toolbar button { background: #e5e7eb; color: #374151; border: 1px solid #d1d5db; padding: 3px 10px; font-size: 11px; font-family: inherit; border-radius: 3px; cursor: pointer; }
#toolbar button:hover { background: #d1d5db; }
#toolbar button.active { background: #c7d2fe; border-color: #6366f1; color: #312e81; }
#main { flex: 1; display: flex; overflow: hidden; position: relative; }
#map-container { flex: 1; position: relative; }
#leaflet-map { width: 100%; height: 100%; background: #f5f5f8; }
#force-canvas { width: 100%; height: 100%; display: block; }
#sidebar { width: 0; background: #ffffff; border-left: 1px solid #d1d5db; overflow-y: auto; transition: width 0.2s; flex-shrink: 0; }
#sidebar.open { width: 360px; }
#sidebar-content { padding: 10px; width: 360px; }
#sidebar h3 { color: #4338ca; margin: 8px 0 4px; font-size: 12px; }
#sidebar .field { margin: 2px 0; }
#sidebar .field .key { color: #6b7280; }
#sidebar .field .val { color: #2a2a3e; }
#sidebar table { border-collapse: collapse; width: 100%; margin: 4px 0; }
#sidebar td, #sidebar th { padding: 2px 6px; text-align: left; font-size: 11px; }
#sidebar th { color: #6b7280; border-bottom: 1px solid #d1d5db; }
#sidebar td { border-bottom: 1px solid #e5e7eb; }
#sidebar .node-link { color: #2563eb; cursor: pointer; text-decoration: underline; }
#sidebar .node-link:hover { color: #1d4ed8; }
#sidebar .stat-row { display: flex; justify-content: space-between; padding: 1px 0; }
#sidebar .stat-row .key { color: #6b7280; }
#sidebar .stat-row .val { color: #2a2a3e; }
#sidebar .stat-row .val.bad { color: #dc2626; }
#sidebar .stat-row .val.good { color: #16a34a; }
#legend { position: absolute; bottom: 40px; left: 20px; background: #ffffffee; border: 1px solid #d1d5db; border-radius: 6px; padding: 8px 12px; z-index: 1000; font-size: 11px; }

#loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #9ca3af; font-size: 16px; z-index: 500; }
#summary-bar { display: flex; align-items: center; gap: 16px; padding: 4px 12px; background: #ffffff; border-top: 1px solid #d1d5db; flex-shrink: 0; z-index: 1000; font-size: 11px; color: #6b7280; }
#summary-bar .stat { display: flex; gap: 4px; }

#trace-panel { display: none; position: absolute; top: 40px; right: 10px; width: 320px; max-height: 60vh; background: #ffffffee; border: 1px solid #d1d5db; border-radius: 6px; z-index: 1001; overflow: hidden; }
#trace-panel .header { display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; background: #f9fafb; border-bottom: 1px solid #d1d5db; }
#trace-panel .header span { color: #4338ca; font-size: 12px; font-weight: bold; }
#trace-panel .header button { background: none; border: none; color: #6b7280; cursor: pointer; font-size: 14px; }
#trace-panel .header button:hover { color: #2a2a3e; }
#trace-panel .body { overflow-y: auto; max-height: calc(60vh - 32px); padding: 6px; }
#trace-panel .msg-item { padding: 4px 6px; cursor: pointer; border-radius: 3px; font-size: 11px; border-bottom: 1px solid #e5e7eb; }
#trace-panel .msg-item:hover { background: #f3f4f6; }
#trace-panel .msg-item.active { background: #e0e7ff; border-color: #6366f1; }
#trace-panel .msg-item .time { color: #6b7280; margin-right: 4px; }
#trace-panel .msg-item .route { color: #374151; }
#trace-panel .msg-item .msg-meta { display: flex; gap: 4px; align-items: center; margin-top: 2px; }
#trace-panel .msg-item .badge { padding: 0 4px; border-radius: 2px; font-size: 9px; font-weight: bold; }
#trace-panel .msg-item .badge.dm { background: #dbeafe; color: #1e40af; }
#trace-panel .msg-item .badge.channel { background: #dcfce7; color: #166534; }
#trace-panel .msg-item .badge.flood { background: #fef3c7; color: #92400e; }
#trace-panel .msg-item .badge.direct { background: #ccfbf1; color: #115e59; }
#trace-panel .msg-item .badge.ack { background: #f3e8ff; color: #6b21a8; }
#trace-panel .msg-item .msg-text { color: #9ca3af; font-size: 10px; margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 290px; }
#trace-panel .msg-item .airtime { color: #9ca3af; font-size: 10px; }
#trace-panel .trace-detail { padding: 6px; font-size: 11px; }
#trace-panel .trace-detail .hop-row { padding: 2px 4px; cursor: pointer; border-radius: 2px; }
#trace-panel .trace-detail .hop-row:hover { background: #f3f4f6; }
#trace-panel .trace-detail .hop-num { color: #d97706; font-weight: bold; }
#trace-panel .trace-detail .hop-type { padding: 1px 4px; border-radius: 2px; font-size: 10px; }
#trace-panel .trace-detail .hop-type.tx { background: #fef3c7; color: #92400e; }
#trace-panel .trace-detail .hop-type.rx { background: #dcfce7; color: #166534; }
#trace-panel .trace-detail .hop-type.relay { background: #dbeafe; color: #1e40af; }
#trace-panel .trace-detail .hop-type.collision { background: #fee2e2; color: #991b1b; }
#trace-panel .trace-detail .hop-type.drop { background: #fce7f3; color: #9d174d; }
/* Node events modal */
#events-modal { display: none; position: fixed; inset: 0; z-index: 2000; }
#events-modal .backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.3); }
#events-modal .dialog { position: absolute; top: 5%; left: 10%; right: 10%; bottom: 5%; background: #ffffff; border: 1px solid #d1d5db; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; }
#events-modal .dialog-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 14px; background: #f9fafb; border-bottom: 1px solid #d1d5db; flex-shrink: 0; }
#events-modal .dialog-header h2 { color: #4338ca; font-size: 14px; font-weight: bold; margin: 0; }
#events-modal .dialog-header button { background: none; border: none; color: #6b7280; cursor: pointer; font-size: 18px; padding: 0 4px; }
#events-modal .dialog-header button:hover { color: #2a2a3e; }
#events-modal .dialog-toolbar { display: flex; align-items: center; gap: 8px; padding: 6px 14px; background: #f9fafb; border-bottom: 1px solid #e5e7eb; flex-shrink: 0; flex-wrap: wrap; }
#events-modal .dialog-toolbar label { color: #6b7280; font-size: 10px; cursor: pointer; display: flex; align-items: center; gap: 3px; }
#events-modal .dialog-toolbar label input { margin: 0; }
#events-modal .dialog-toolbar .sep { width: 1px; height: 14px; background: #d1d5db; }
#events-modal .density-bar { height: 24px; padding: 0 14px; background: #f3f4f6; flex-shrink: 0; position: relative; }
#events-modal .density-bar canvas { width: 100%; height: 100%; display: block; }
#events-modal .dialog-body { flex: 1; overflow-y: auto; }
#events-modal .ev-table { width: 100%; border-collapse: collapse; font-size: 11px; }
#events-modal .ev-table th { position: sticky; top: 0; background: #f9fafb; color: #6b7280; padding: 4px 8px; text-align: left; border-bottom: 1px solid #d1d5db; cursor: pointer; user-select: none; white-space: nowrap; }
#events-modal .ev-table th:hover { color: #374151; }
#events-modal .ev-table th .sort-arrow { color: #6366f1; margin-left: 2px; }
#events-modal .ev-table td { padding: 3px 8px; border-bottom: 1px solid #f3f4f6; white-space: nowrap; }
#events-modal .ev-table tr:hover { background: #f3f4f6; }
#events-modal .ev-table tr.type-tx { color: #b45309; }
#events-modal .ev-table tr.type-rx { color: #15803d; }
#events-modal .ev-table tr.type-collision { color: #dc2626; }
#events-modal .ev-table tr.type-drop { color: #be185d; }
#events-modal .ev-table tr.type-cmd { color: #4338ca; }
#events-modal .ev-table .pkt-link { color: #2563eb; cursor: pointer; text-decoration: underline; }
#events-modal .ev-table .pkt-link:hover { color: #1d4ed8; }
#events-modal .ev-table .ev-badge { padding: 1px 4px; border-radius: 2px; font-size: 9px; font-weight: bold; }
#events-modal .ev-table .ev-badge.tx { background: #fef3c7; color: #92400e; }
#events-modal .ev-table .ev-badge.rx { background: #dcfce7; color: #166534; }
#events-modal .ev-table .ev-badge.collision { background: #fee2e2; color: #991b1b; }
#events-modal .ev-table .ev-badge.drop { background: #fce7f3; color: #9d174d; }
#events-modal .ev-table .ev-badge.cmd { background: #e0e7ff; color: #4338ca; }
#events-modal .dialog-footer { display: flex; align-items: center; gap: 12px; padding: 4px 14px; background: #f9fafb; border-top: 1px solid #d1d5db; flex-shrink: 0; font-size: 11px; color: #6b7280; }
.leaflet-container { background: #f5f5f8 !important; }
/* Scrollbar styles for light theme */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #f3f4f6; }
::-webkit-scrollbar-thumb { background: #c4c4c4; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #aaa; }
</style>
</head>
<body>

<div id="toolbar">
    <a href="/static/simulations.html" style="color:#4338ca;text-decoration:none;margin-right:8px;">&larr; Back</a>
    <span class="info" id="title">MeshCore Topology Map</span>
    <div class="sep"></div>
    <label>Filter:</label>
    <input id="node-filter" type="text" placeholder="node name..." style="width:120px">
    <div class="sep"></div>
    <label>Nodes:</label>
    <select id="node-color-mode">
        <option value="role">Role</option>
        <option value="tx">TX count</option>
        <option value="collision">Collisions</option>
        <option value="delivery">Delivery %</option>
    </select>
    <div class="sep"></div>
    <label>Links:</label>
    <select id="link-display">
        <option value="all">All</option>
        <option value="snr-high">SNR > 5</option>
        <option value="snr-low">SNR &lt;= 5</option>
        <option value="none">None</option>
    </select>
    <label>Color:</label>
    <select id="link-color-mode">
        <option value="snr">SNR</option>
        <option value="traffic">Traffic</option>
        <option value="collision">Collision rate</option>
    </select>
    <div class="sep"></div>
    <button id="btn-labels" title="Toggle node labels">Labels</button>
    <button id="btn-snr-labels" title="Toggle SNR labels on links">SNR</button>
    <button id="btn-trace" title="Show message traces">Trace</button>
    <div class="sep"></div>
    <span class="info" id="stats-info"></span>
</div>

<div id="main">
    <div id="map-container">
        <div id="leaflet-map"></div>
        <canvas id="force-canvas" style="display:none"></canvas>
        <div id="loading">Loading topology...</div>
        <div id="legend"></div>
        <div id="trace-panel">
            <div class="header">
                <span>Message Traces</span>
                <button id="trace-close">&times;</button>
            </div>
            <div class="body" id="trace-body"></div>
        </div>
    </div>
    <div id="sidebar">
        <div id="sidebar-content"></div>
    </div>
</div>

<div id="summary-bar"></div>

<div id="events-modal">
    <div class="backdrop"></div>
    <div class="dialog">
        <div class="dialog-header">
            <h2 id="events-modal-title">Node Events</h2>
            <button id="events-modal-close">&times;</button>
        </div>
        <div class="dialog-toolbar" id="events-modal-toolbar"></div>
        <div class="density-bar"><canvas id="events-density-canvas"></canvas></div>
        <div class="dialog-body" id="events-modal-body"></div>
        <div class="dialog-footer" id="events-modal-footer"></div>
    </div>
</div>

<script>
const SIM_ID = new URLSearchParams(window.location.search).get('sim');
if (!SIM_ID) {
    document.body.innerHTML = '<p style="color:red;padding:20px;">Error: No simulation ID. Use ?sim=ID</p>';
}

const COL_REPEATER = '#4488ff';
const COL_COMPANION = '#44cc66';
const COL_LINK = '#556688';
const COL_LINK_WEAK = '#aa5555';
const COL_HIGHLIGHT = '#d97706';

let topology = null;
let leafletMap = null;
let markers = {};        // name -> L.circleMarker
let linkLines = [];       // [{line: L.polyline, link: {...}}]
let showLabels = false;
let showSnrLabels = false;
let labelMarkers = [];
let snrLabelMarkers = [];
let selectedNode = null;

// Simulation stats
let simStats = null;
let messages = [];
let activeTrace = null;     // current deep_trace result
let traceLayer = null;      // L.layerGroup for trace overlays
let traceForceData = null;  // trace data for force canvas

// Force-directed state
let forceNodes = [];
let forceLinks = [];
let forceCanvas = null;
let forceCtx = null;
let forceDrag = null;

// ── Color helpers ────────────────────────────────────────────

function lerpColor(val, min, max, colLow, colHigh) {
    if (max <= min) return colLow;
    const t = Math.max(0, Math.min(1, (val - min) / (max - min)));
    const r = Math.round(colLow[0] + t * (colHigh[0] - colLow[0]));
    const g = Math.round(colLow[1] + t * (colHigh[1] - colLow[1]));
    const b = Math.round(colLow[2] + t * (colHigh[2] - colLow[2]));
    return `rgb(${r},${g},${b})`;
}

function getNodeColor(name, role) {
    const mode = document.getElementById('node-color-mode').value;
    if (!simStats || mode === 'role') {
        return role === 'companion' ? COL_COMPANION : COL_REPEATER;
    }
    const ns = simStats.nodes[name] || { tx: 0, rx: 0, collision: 0, drop: 0 };
    const allNodes = Object.values(simStats.nodes);
    if (mode === 'tx') {
        const vals = allNodes.map(n => n.tx);
        const mn = Math.min(...vals, 0), mx = Math.max(...vals, 1);
        return lerpColor(ns.tx, mn, mx, [100, 180, 255], [255, 60, 60]);
    }
    if (mode === 'collision') {
        const vals = allNodes.map(n => n.collision);
        const mx = Math.max(...vals, 1);
        return lerpColor(ns.collision, 0, mx, [60, 200, 80], [255, 60, 60]);
    }
    if (mode === 'delivery') {
        if (role !== 'companion') return '#b0b0b0';
        const ms = simStats.msg_stats.find(s => s.node === name);
        if (!ms) return '#b0b0b0';
        const sent = (ms.msg_sent || 0) + (ms.chan_msg_sent || 0);
        const recv = (ms.msg_recv || 0) + (ms.chan_msg_recv || 0);
        if (sent === 0 && recv === 0) return '#b0b0b0';
        const pct = sent > 0 ? (recv / sent) * 100 : 100;
        return lerpColor(pct, 0, 100, [255, 60, 60], [60, 220, 80]);
    }
    return role === 'companion' ? COL_COMPANION : COL_REPEATER;
}

function getLinkStyle(link) {
    const mode = document.getElementById('link-color-mode').value;
    if (!simStats || mode === 'snr') {
        return {
            color: link.snr > 5 ? COL_LINK : COL_LINK_WEAK,
            weight: Math.max(1, Math.min(5, link.snr / 4)),
            opacity: Math.max(0.3, Math.min(0.8, link.snr / 15)),
        };
    }
    // Aggregate both directions for undirected display
    const k1 = `${link.from}>${link.to}`, k2 = `${link.to}>${link.from}`;
    const ls1 = simStats.links[k1] || { rx: 0, collision: 0, drop: 0 };
    const ls2 = simStats.links[k2] || { rx: 0, collision: 0, drop: 0 };
    const rx = ls1.rx + ls2.rx;
    const coll = ls1.collision + ls2.collision;
    const drop = ls1.drop + ls2.drop;
    const total = rx + coll + drop;

    if (mode === 'traffic') {
        if (total === 0) return { color: '#d1d5db', weight: 1, opacity: 0.4 };
        const allLinks = Object.values(simStats.links);
        const maxTraffic = Math.max(...allLinks.map(l => l.rx + l.collision + l.drop), 1);
        const t = total / maxTraffic;
        return {
            color: lerpColor(t, 0, 1, [120, 140, 180], [30, 100, 220]),
            weight: Math.max(1, Math.min(6, 1 + t * 5)),
            opacity: Math.max(0.4, Math.min(0.9, 0.4 + t * 0.5)),
        };
    }
    if (mode === 'collision') {
        if (total === 0) return { color: '#d1d5db', weight: 1, opacity: 0.4 };
        const rate = (coll + drop) / total;
        return {
            color: lerpColor(rate, 0, 0.3, [60, 200, 80], [255, 60, 60]),
            weight: Math.max(1, Math.min(5, 1 + total / 10)),
            opacity: Math.max(0.4, 0.9),
        };
    }
    return { color: COL_LINK, weight: 2, opacity: 0.5 };
}

// ── Init ─────────────────────────────────────────────────────

async function init() {
    try {
        const [topoResp, statsResp, msgResp] = await Promise.all([
            fetch(`/api/sims/${SIM_ID}/topology`),
            fetch(`/api/sims/${SIM_ID}/stats`),
            fetch(`/api/sims/${SIM_ID}/messages`),
        ]);
        topology = await topoResp.json();
        simStats = await statsResp.json();
        messages = await msgResp.json();
    } catch (e) {
        document.getElementById('loading').textContent = 'Failed to load: ' + e.message;
        return;
    }

    // If stats is empty object (no simulation data), null it out
    if (!simStats || !simStats.totals) simStats = null;

    document.getElementById('loading').style.display = 'none';
    document.getElementById('stats-info').textContent =
        `${topology.nodes.length} nodes, ${topology.links.length} links`;

    if (topology.has_geo) {
        initLeaflet();
    } else {
        initForceLayout();
    }

    setupControls();
    updateSummaryBar();
    updateLegend();
}

// ── Summary bar ──────────────────────────────────────────────

function updateSummaryBar() {
    const bar = document.getElementById('summary-bar');
    if (!simStats) {
        bar.innerHTML = '<span class="stat"><span class="label">No simulation data</span></span>';
        return;
    }
    const t = simStats.totals;
    const dur = ((simStats.time_max - simStats.time_min) / 1000).toFixed(1);
    const rxPct = t.tx > 0 ? ((t.rx / t.tx) * 100).toFixed(0) : '-';
    const collPct = t.tx > 0 ? ((t.collision / t.tx) * 100).toFixed(0) : '-';

    let html = '';
    html += `<span class="stat"><span class="label">TX:</span><span class="value">${t.tx}</span></span>`;
    html += `<span class="sep"></span>`;
    html += `<span class="stat"><span class="label">RX:</span><span class="value">${t.rx} (${rxPct}%)</span></span>`;
    html += `<span class="sep"></span>`;
    html += `<span class="stat"><span class="label">Collisions:</span><span class="value${t.collision > 0 ? ' warn' : ''}">${t.collision} (${collPct}%)</span></span>`;
    html += `<span class="sep"></span>`;
    html += `<span class="stat"><span class="label">Drops:</span><span class="value${t.drop > 0 ? ' warn' : ''}">${t.drop}</span></span>`;
    html += `<span class="sep"></span>`;
    html += `<span class="stat"><span class="label">Duration:</span><span class="value">${dur}s</span></span>`;

    // Message stats from companions
    if (simStats.msg_stats && simStats.msg_stats.length > 0) {
        let totalSent = 0, totalRecv = 0;
        for (const ms of simStats.msg_stats) {
            totalSent += (ms.msg_sent || 0) + (ms.chan_msg_sent || 0);
            totalRecv += (ms.msg_recv || 0) + (ms.chan_msg_recv || 0);
        }
        if (totalSent > 0 || totalRecv > 0) {
            const delPct = totalSent > 0 ? ((totalRecv / totalSent) * 100).toFixed(0) : '-';
            html += `<span class="sep"></span>`;
            html += `<span class="stat"><span class="label">Messages:</span><span class="value">${totalSent} sent, ${totalRecv} delivered (${delPct}%)</span></span>`;
        }
    }
    bar.innerHTML = html;
}

// ── Legend ────────────────────────────────────────────────────

function updateLegend() {
    const legend = document.getElementById('legend');
    const nodeMode = document.getElementById('node-color-mode').value;
    const linkMode = document.getElementById('link-color-mode').value;
    let html = '';

    if (nodeMode === 'role') {
        html += `<div class="item"><div class="dot" style="background:${COL_REPEATER}"></div> Repeater</div>`;
        html += `<div class="item"><div class="dot" style="background:${COL_COMPANION}"></div> Companion</div>`;
    } else if (nodeMode === 'tx') {
        html += `<div class="item"><div class="gradient" style="background:linear-gradient(to right,rgb(100,180,255),rgb(255,60,60))"></div> TX count</div>`;
    } else if (nodeMode === 'collision') {
        html += `<div class="item"><div class="gradient" style="background:linear-gradient(to right,rgb(60,200,80),rgb(255,60,60))"></div> Collisions</div>`;
    } else if (nodeMode === 'delivery') {
        html += `<div class="item"><div class="gradient" style="background:linear-gradient(to right,rgb(255,60,60),rgb(60,220,80))"></div> Delivery %</div>`;
        html += `<div class="item"><div class="dot" style="background:#b0b0b0"></div> Repeater/no data</div>`;
    }

    if (linkMode === 'snr') {
        html += `<div class="item"><div class="line" style="background:${COL_LINK}"></div> Link (SNR)</div>`;
    } else if (linkMode === 'traffic') {
        html += `<div class="item"><div class="gradient" style="background:linear-gradient(to right,rgb(120,140,180),rgb(30,100,220))"></div> Link traffic</div>`;
    } else if (linkMode === 'collision') {
        html += `<div class="item"><div class="gradient" style="background:linear-gradient(to right,rgb(60,200,80),rgb(255,60,60))"></div> Link collision rate</div>`;
    }

    legend.innerHTML = html;
}

// ── Leaflet geo mode ──────────────────────────────────────────

function initLeaflet() {
    document.getElementById('leaflet-map').style.display = 'block';
    document.getElementById('force-canvas').style.display = 'none';

    leafletMap = L.map('leaflet-map', {
        zoomControl: true,
        attributionControl: false,
    });

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
    }).addTo(leafletMap);

    traceLayer = L.layerGroup().addTo(leafletMap);

    const neighbors = buildNeighborMap();
    drawLeafletLinks();

    const bounds = L.latLngBounds();
    for (const node of topology.nodes) {
        if (node.lat == null || node.lon == null) continue;
        const ll = L.latLng(node.lat, node.lon);
        bounds.extend(ll);

        const nLinks = (neighbors[node.name] || []).length;
        const radius = Math.max(4, Math.min(12, 4 + nLinks));
        const color = getNodeColor(node.name, node.role);

        const marker = L.circleMarker(ll, {
            radius: radius,
            color: color,
            fillColor: color,
            fillOpacity: 0.7,
            weight: 1,
        }).addTo(leafletMap);

        marker.on('click', () => selectNode(node.name));
        marker.bindTooltip(node.name, {
            permanent: false, direction: 'top', offset: [0, -radius],
        });
        markers[node.name] = marker;
    }

    if (bounds.isValid()) {
        leafletMap.fitBounds(bounds, { padding: [30, 30] });
    }
}

function drawLeafletLinks() {
    for (const ll of linkLines) {
        leafletMap.removeLayer(ll.line);
    }
    linkLines = [];

    const filter = document.getElementById('link-display').value;
    const drawn = new Set();
    for (const link of topology.links) {
        const key = [link.from, link.to].sort().join('|');
        if (drawn.has(key)) continue;
        drawn.add(key);

        if (filter === 'none') continue;
        if (filter === 'snr-high' && link.snr <= 5) continue;
        if (filter === 'snr-low' && link.snr > 5) continue;

        const fromNode = topology.nodes.find(n => n.name === link.from);
        const toNode = topology.nodes.find(n => n.name === link.to);
        if (!fromNode || !toNode || fromNode.lat == null || toNode.lat == null) continue;

        const style = getLinkStyle(link);

        const line = L.polyline(
            [[fromNode.lat, fromNode.lon], [toNode.lat, toNode.lon]],
            style
        ).addTo(leafletMap);

        line.on('click', () => selectLink(link));
        line.bindTooltip(`${link.from} <-> ${link.to}: SNR=${link.snr}dB`, {
            sticky: true,
        });
        linkLines.push({ line, link });
    }
}

function recolorNodes() {
    if (topology.has_geo) {
        for (const node of topology.nodes) {
            if (!markers[node.name]) continue;
            const color = getNodeColor(node.name, node.role);
            markers[node.name].setStyle({ color, fillColor: color });
        }
    }
    updateLegend();
    if (!topology.has_geo) drawForce();
}

function restyleLinks() {
    if (topology.has_geo) {
        for (const ll of linkLines) {
            const style = getLinkStyle(ll.link);
            ll.line.setStyle(style);
        }
    }
    updateLegend();
    if (!topology.has_geo) drawForce();
}

function toggleLabels() {
    showLabels = !showLabels;
    document.getElementById('btn-labels').classList.toggle('active', showLabels);

    if (showLabels) {
        for (const node of topology.nodes) {
            if (!markers[node.name]) continue;
            const ll = markers[node.name].getLatLng();
            const lbl = L.marker(ll, {
                icon: L.divIcon({
                    className: 'node-label',
                    html: `<span style="color:#374151;font-size:10px;text-shadow:0 0 3px #fff,0 0 3px #fff;white-space:nowrap">${node.name}</span>`,
                    iconAnchor: [-8, 4],
                }),
                interactive: false,
            }).addTo(leafletMap);
            labelMarkers.push(lbl);
        }
    } else {
        for (const lbl of labelMarkers) leafletMap.removeLayer(lbl);
        labelMarkers = [];
    }
}

function toggleSnrLabels() {
    showSnrLabels = !showSnrLabels;
    document.getElementById('btn-snr-labels').classList.toggle('active', showSnrLabels);

    if (showSnrLabels) {
        const drawn = new Set();
        for (const link of topology.links) {
            const key = [link.from, link.to].sort().join('|');
            if (drawn.has(key)) continue;
            drawn.add(key);

            const fromNode = topology.nodes.find(n => n.name === link.from);
            const toNode = topology.nodes.find(n => n.name === link.to);
            if (!fromNode || !toNode || fromNode.lat == null || toNode.lat == null) continue;

            const midLat = (fromNode.lat + toNode.lat) / 2;
            const midLon = (fromNode.lon + toNode.lon) / 2;
            const col = link.snr > 5 ? '#374151' : '#dc2626';
            const lbl = L.marker([midLat, midLon], {
                icon: L.divIcon({
                    className: 'snr-label',
                    html: `<span style="color:${col};font-size:9px;text-shadow:0 0 3px #fff,0 0 3px #fff">${link.snr.toFixed(1)}</span>`,
                    iconAnchor: [12, 6],
                }),
                interactive: false,
            }).addTo(leafletMap);
            snrLabelMarkers.push(lbl);
        }
    } else {
        for (const lbl of snrLabelMarkers) leafletMap.removeLayer(lbl);
        snrLabelMarkers = [];
    }
}

// ── Force-directed layout (no geo) ───────────────────────────

function initForceLayout() {
    document.getElementById('leaflet-map').style.display = 'none';
    forceCanvas = document.getElementById('force-canvas');
    forceCanvas.style.display = 'block';
    forceCtx = forceCanvas.getContext('2d');

    const rect = forceCanvas.parentElement.getBoundingClientRect();
    forceCanvas.width = rect.width * devicePixelRatio;
    forceCanvas.height = rect.height * devicePixelRatio;
    forceCanvas.style.width = rect.width + 'px';
    forceCanvas.style.height = rect.height + 'px';
    forceCtx.scale(devicePixelRatio, devicePixelRatio);

    const W = rect.width, H = rect.height;
    const neighbors = buildNeighborMap();

    forceNodes = topology.nodes.map((n, i) => {
        const angle = (2 * Math.PI * i) / topology.nodes.length;
        const r = Math.min(W, H) * 0.35;
        return {
            name: n.name,
            role: n.role,
            x: W / 2 + r * Math.cos(angle),
            y: H / 2 + r * Math.sin(angle),
            vx: 0, vy: 0,
            nLinks: (neighbors[n.name] || []).length,
        };
    });

    const nodeIdx = {};
    forceNodes.forEach((n, i) => nodeIdx[n.name] = i);

    const drawn = new Set();
    forceLinks = [];
    for (const link of topology.links) {
        const key = [link.from, link.to].sort().join('|');
        if (drawn.has(key)) continue;
        drawn.add(key);
        const si = nodeIdx[link.from], ti = nodeIdx[link.to];
        if (si != null && ti != null) {
            forceLinks.push({ source: si, target: ti, snr: link.snr, link });
        }
    }

    const iterations = 300;
    const repulsion = 2000;
    const attraction = 0.005;
    const damping = 0.9;
    const centerPull = 0.001;

    for (let iter = 0; iter < iterations; iter++) {
        for (let i = 0; i < forceNodes.length; i++) {
            for (let j = i + 1; j < forceNodes.length; j++) {
                let dx = forceNodes[j].x - forceNodes[i].x;
                let dy = forceNodes[j].y - forceNodes[i].y;
                let d2 = dx * dx + dy * dy;
                if (d2 < 1) d2 = 1;
                const f = repulsion / d2;
                const fx = f * dx / Math.sqrt(d2);
                const fy = f * dy / Math.sqrt(d2);
                forceNodes[i].vx -= fx;
                forceNodes[i].vy -= fy;
                forceNodes[j].vx += fx;
                forceNodes[j].vy += fy;
            }
        }
        for (const fl of forceLinks) {
            const s = forceNodes[fl.source], t = forceNodes[fl.target];
            const dx = t.x - s.x, dy = t.y - s.y;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d < 1) continue;
            const f = attraction * d;
            const fx = f * dx / d, fy = f * dy / d;
            s.vx += fx; s.vy += fy;
            t.vx -= fx; t.vy -= fy;
        }
        for (const n of forceNodes) {
            n.vx += (W / 2 - n.x) * centerPull;
            n.vy += (H / 2 - n.y) * centerPull;
        }
        for (const n of forceNodes) {
            n.vx *= damping; n.vy *= damping;
            n.x += n.vx; n.y += n.vy;
            n.x = Math.max(20, Math.min(W - 20, n.x));
            n.y = Math.max(20, Math.min(H - 20, n.y));
        }
    }

    drawForce();

    forceCanvas.addEventListener('click', (e) => {
        const rect = forceCanvas.getBoundingClientRect();
        const mx = e.clientX - rect.left, my = e.clientY - rect.top;
        let closest = null, closestD = 15;
        for (const n of forceNodes) {
            const d = Math.sqrt((n.x - mx) ** 2 + (n.y - my) ** 2);
            if (d < closestD) { closest = n; closestD = d; }
        }
        if (closest) {
            selectNode(closest.name);
            drawForce();
        } else {
            for (const fl of forceLinks) {
                const s = forceNodes[fl.source], t = forceNodes[fl.target];
                const d = pointToSegmentDist(mx, my, s.x, s.y, t.x, t.y);
                if (d < 6) {
                    selectLink(fl.link);
                    return;
                }
            }
            clearSelection();
            drawForce();
        }
    });

    window.addEventListener('resize', () => {
        const rect = forceCanvas.parentElement.getBoundingClientRect();
        forceCanvas.width = rect.width * devicePixelRatio;
        forceCanvas.height = rect.height * devicePixelRatio;
        forceCanvas.style.width = rect.width + 'px';
        forceCanvas.style.height = rect.height + 'px';
        forceCtx.setTransform(1, 0, 0, 1, 0, 0);
        forceCtx.scale(devicePixelRatio, devicePixelRatio);
        drawForce();
    });
}

function drawForce() {
    if (!forceCtx) return;
    const W = forceCanvas.width / devicePixelRatio;
    const H = forceCanvas.height / devicePixelRatio;
    forceCtx.clearRect(0, 0, W, H);

    // Fill canvas background with light color
    forceCtx.fillStyle = '#f5f5f8';
    forceCtx.fillRect(0, 0, W, H);

    const filter = document.getElementById('link-display').value;

    // Draw links
    for (const fl of forceLinks) {
        if (filter === 'none') continue;
        if (filter === 'snr-high' && fl.snr <= 5) continue;
        if (filter === 'snr-low' && fl.snr > 5) continue;

        const s = forceNodes[fl.source], t = forceNodes[fl.target];
        const isHighlight = selectedNode && (s.name === selectedNode || t.name === selectedNode);
        const style = getLinkStyle(fl.link);

        forceCtx.strokeStyle = isHighlight ? COL_HIGHLIGHT : style.color;
        forceCtx.lineWidth = isHighlight ? style.weight + 1 : style.weight;
        forceCtx.globalAlpha = isHighlight ? 0.9 : style.opacity;
        forceCtx.beginPath();
        forceCtx.moveTo(s.x, s.y);
        forceCtx.lineTo(t.x, t.y);
        forceCtx.stroke();

        if (showSnrLabels) {
            const mx = (s.x + t.x) / 2, my = (s.y + t.y) / 2;
            forceCtx.globalAlpha = 0.8;
            forceCtx.fillStyle = fl.snr > 5 ? '#374151' : '#dc2626';
            forceCtx.font = '9px monospace';
            forceCtx.fillText(fl.snr.toFixed(1), mx + 2, my - 2);
        }
    }
    forceCtx.globalAlpha = 1;

    // Draw trace lines if active
    if (traceForceData) {
        drawForceTrace();
    }

    // Draw nodes
    for (const n of forceNodes) {
        const r = Math.max(4, Math.min(12, 4 + n.nLinks));
        const isSel = n.name === selectedNode;
        const color = getNodeColor(n.name, n.role);

        forceCtx.beginPath();
        forceCtx.arc(n.x, n.y, r, 0, 2 * Math.PI);
        forceCtx.fillStyle = color;
        forceCtx.globalAlpha = isSel ? 1 : 0.7;
        forceCtx.fill();
        if (isSel) {
            forceCtx.strokeStyle = COL_HIGHLIGHT;
            forceCtx.lineWidth = 2;
            forceCtx.stroke();
        }
        forceCtx.globalAlpha = 1;

        if (showLabels) {
            forceCtx.fillStyle = '#374151';
            forceCtx.font = '10px monospace';
            forceCtx.fillText(n.name, n.x + r + 3, n.y + 3);
        }
    }
}

function pointToSegmentDist(px, py, ax, ay, bx, by) {
    const dx = bx - ax, dy = by - ay;
    const len2 = dx * dx + dy * dy;
    if (len2 === 0) return Math.sqrt((px - ax) ** 2 + (py - ay) ** 2);
    let t = ((px - ax) * dx + (py - ay) * dy) / len2;
    t = Math.max(0, Math.min(1, t));
    const cx = ax + t * dx, cy = ay + t * dy;
    return Math.sqrt((px - cx) ** 2 + (py - cy) ** 2);
}

// ── Shared logic ─────────────────────────────────────────────

function buildNeighborMap() {
    const neighbors = {};
    for (const link of topology.links) {
        if (!neighbors[link.from]) neighbors[link.from] = [];
        neighbors[link.from].push({ peer: link.to, snr: link.snr, rssi: link.rssi });
    }
    return neighbors;
}

function getNodePos(name) {
    // Return position for geo or force mode
    if (topology.has_geo) {
        const node = topology.nodes.find(n => n.name === name);
        if (node && node.lat != null) return { lat: node.lat, lon: node.lon };
    } else {
        const fn = forceNodes.find(n => n.name === name);
        if (fn) return { x: fn.x, y: fn.y };
    }
    return null;
}

function selectNode(name) {
    selectedNode = name;
    const sidebar = document.getElementById('sidebar');
    const content = document.getElementById('sidebar-content');
    sidebar.classList.add('open');

    const node = topology.nodes.find(n => n.name === name);
    if (!node) return;

    const neighbors = buildNeighborMap();
    const nodeNeighbors = neighbors[name] || [];

    const inLinks = topology.links.filter(l => l.to === name);
    const allPeers = new Map();
    for (const n of nodeNeighbors) {
        allPeers.set(n.peer, { snr_out: n.snr, rssi_out: n.rssi });
    }
    for (const l of inLinks) {
        const existing = allPeers.get(l.from) || {};
        existing.snr_in = l.snr;
        existing.rssi_in = l.rssi;
        allPeers.set(l.from, existing);
    }

    let html = `<h3>${name}</h3>`;
    html += `<div class="field"><span class="key">Role: </span><span class="val">${node.role}</span></div>`;
    if (node.lat != null) {
        html += `<div class="field"><span class="key">Position: </span><span class="val">${node.lat.toFixed(5)}, ${node.lon.toFixed(5)}</span></div>`;
    }
    html += `<div class="field"><span class="key">Links: </span><span class="val">${allPeers.size}</span></div>`;

    // Simulation stats
    if (simStats) {
        const ns = simStats.nodes[name] || { tx: 0, rx: 0, collision: 0, drop: 0 };
        html += `<h3>Simulation Stats</h3>`;
        html += `<div class="stat-row"><span class="key">TX</span><span class="val">${ns.tx}</span></div>`;
        html += `<div class="stat-row"><span class="key">RX</span><span class="val">${ns.rx}</span></div>`;
        const collPct = (ns.rx + ns.collision) > 0 ? ((ns.collision / (ns.rx + ns.collision)) * 100).toFixed(1) : '0.0';
        html += `<div class="stat-row"><span class="key">Collisions</span><span class="val${ns.collision > 0 ? ' bad' : ''}">${ns.collision} (${collPct}%)</span></div>`;
        html += `<div class="stat-row"><span class="key">Drops</span><span class="val${ns.drop > 0 ? ' bad' : ''}">${ns.drop}</span></div>`;

        // Message stats for companions
        const ms = simStats.msg_stats.find(s => s.node === name);
        if (ms) {
            html += `<h3>Messages</h3>`;
            const sent = (ms.msg_sent || 0) + (ms.chan_msg_sent || 0);
            const recv = (ms.msg_recv || 0) + (ms.chan_msg_recv || 0);
            html += `<div class="stat-row"><span class="key">Sent</span><span class="val">${sent}</span></div>`;
            html += `<div class="stat-row"><span class="key">Received</span><span class="val">${recv}</span></div>`;
            if (sent > 0) {
                const delPct = ((recv / sent) * 100).toFixed(0);
                html += `<div class="stat-row"><span class="key">Delivery</span><span class="val${recv < sent ? ' bad' : ' good'}">${delPct}%</span></div>`;
            }
        }

        // Repeater stats (core/radio/packets)
        const rStats = (simStats.repeater_stats || []).filter(s => s.node === name);
        if (rStats.length > 0) {
            const radio = rStats.find(s => s.stats_type === 'radio');
            if (radio && radio.data) {
                html += '<h3>Radio</h3>';
                const d = radio.data;
                html += statRow('Last RSSI', d.last_rssi + ' dBm');
                html += statRow('Last SNR', d.last_snr.toFixed(2) + ' dB');
                html += statRow('TX airtime', d.tx_air_secs + 's');
                html += statRow('RX airtime', d.rx_air_secs + 's');
            }
            const pkts = rStats.find(s => s.stats_type === 'packets');
            if (pkts && pkts.data) {
                html += '<h3>Packets</h3>';
                const d = pkts.data;
                html += statRow('Received', d.recv);
                html += statRow('Sent', d.sent);
                html += statRow('Flood TX/RX', d.flood_tx + ' / ' + d.flood_rx);
                html += statRow('Direct TX/RX', d.direct_tx + ' / ' + d.direct_rx);
                if (d.recv_errors > 0)
                    html += statRow('Errors', d.recv_errors, true);
            }
            const core = rStats.find(s => s.stats_type === 'core');
            if (core && core.data) {
                html += '<h3>Core</h3>';
                const d = core.data;
                html += statRow('Uptime', d.uptime_secs + 's');
                html += statRow('Queue', d.queue_len);
                if (d.errors > 0)
                    html += statRow('Errors', d.errors, true);
            }
        }

        // Events button
        html += `<div style="margin-top:6px"><button class="events-btn" data-node="${name}" style="background:#e5e7eb;color:#374151;border:1px solid #d1d5db;padding:4px 12px;font-size:11px;font-family:inherit;border-radius:3px;cursor:pointer;width:100%">Show Events (${ns.tx + ns.rx + ns.collision + ns.drop})</button></div>`;
    }

    html += `<h3>Neighbors</h3>`;
    html += `<table><tr><th>Node</th><th>SNR-></th><th>RSSI-></th><th>SNR<-</th><th>RSSI<-</th></tr>`;
    for (const [peer, info] of allPeers) {
        html += `<tr>`;
        html += `<td><span class="node-link" data-node="${peer}">${peer}</span></td>`;
        html += `<td>${info.snr_out != null ? info.snr_out.toFixed(1) : '-'}</td>`;
        html += `<td>${info.rssi_out != null ? info.rssi_out.toFixed(0) : '-'}</td>`;
        html += `<td>${info.snr_in != null ? info.snr_in.toFixed(1) : '-'}</td>`;
        html += `<td>${info.rssi_in != null ? info.rssi_in.toFixed(0) : '-'}</td>`;
        html += `</tr>`;
    }
    html += `</table>`;

    content.innerHTML = html;
    content.querySelectorAll('.node-link').forEach(el => {
        el.addEventListener('click', () => selectNode(el.dataset.node));
    });
    const evBtn = content.querySelector('.events-btn');
    if (evBtn) {
        evBtn.addEventListener('click', () => openNodeEventsModal(evBtn.dataset.node));
    }

    highlightNode(name);
}

function selectLink(link) {
    const sidebar = document.getElementById('sidebar');
    const content = document.getElementById('sidebar-content');
    sidebar.classList.add('open');

    let html = `<h3>Link</h3>`;
    html += `<div class="field"><span class="key">From: </span><span class="val node-link" data-node="${link.from}">${link.from}</span></div>`;
    html += `<div class="field"><span class="key">To: </span><span class="val node-link" data-node="${link.to}">${link.to}</span></div>`;
    html += `<div class="field"><span class="key">SNR: </span><span class="val">${link.snr.toFixed(1)} dB</span></div>`;
    html += `<div class="field"><span class="key">RSSI: </span><span class="val">${link.rssi.toFixed(0)} dBm</span></div>`;
    if (link.snr_std_dev) {
        html += `<div class="field"><span class="key">SNR std dev: </span><span class="val">${link.snr_std_dev}</span></div>`;
    }
    if (link.loss) {
        html += `<div class="field"><span class="key">Loss: </span><span class="val">${(link.loss * 100).toFixed(1)}%</span></div>`;
    }
    if (link.bidir !== undefined) {
        html += `<div class="field"><span class="key">Bidirectional: </span><span class="val">${link.bidir ? 'yes' : 'no'}</span></div>`;
    }

    // Link simulation stats
    if (simStats) {
        const k1 = `${link.from}>${link.to}`, k2 = `${link.to}>${link.from}`;
        const ls1 = simStats.links[k1] || { rx: 0, collision: 0, drop: 0 };
        const ls2 = simStats.links[k2] || { rx: 0, collision: 0, drop: 0 };
        html += `<h3>Simulation Stats</h3>`;
        html += `<div class="stat-row"><span class="key">RX (${link.from}->${link.to})</span><span class="val">${ls1.rx}</span></div>`;
        html += `<div class="stat-row"><span class="key">RX (${link.to}->${link.from})</span><span class="val">${ls2.rx}</span></div>`;
        const totalColl = ls1.collision + ls2.collision;
        const totalDrop = ls1.drop + ls2.drop;
        html += `<div class="stat-row"><span class="key">Collisions</span><span class="val${totalColl > 0 ? ' bad' : ''}">${totalColl}</span></div>`;
        html += `<div class="stat-row"><span class="key">Drops</span><span class="val${totalDrop > 0 ? ' bad' : ''}">${totalDrop}</span></div>`;
    }

    content.innerHTML = html;
    content.querySelectorAll('.node-link').forEach(el => {
        el.addEventListener('click', () => selectNode(el.dataset.node));
    });
}

function clearSelection() {
    selectedNode = null;
    document.getElementById('sidebar').classList.remove('open');

    if (topology.has_geo) {
        recolorNodes();
    }
}

function highlightNode(name) {
    if (topology.has_geo) {
        // Reset all to current color mode
        for (const node of topology.nodes) {
            if (!markers[node.name]) continue;
            const color = getNodeColor(node.name, node.role);
            markers[node.name].setStyle({ color, fillColor: color, weight: 1 });
        }
        // Highlight selected
        if (markers[name]) {
            markers[name].setStyle({ color: COL_HIGHLIGHT, fillColor: COL_HIGHLIGHT, weight: 3 });
        }
        // Highlight neighbors
        const neighbors = buildNeighborMap();
        const peers = neighbors[name] || [];
        const inPeers = topology.links.filter(l => l.to === name).map(l => l.from);
        const allPeerNames = new Set([...peers.map(p => p.peer), ...inPeers]);
        for (const peer of allPeerNames) {
            if (markers[peer]) {
                markers[peer].setStyle({ weight: 2 });
            }
        }
        // Highlight connected links
        for (const ll of linkLines) {
            const l = ll.link;
            const isConnected = (l.from === name || l.to === name);
            if (isConnected) {
                ll.line.setStyle({ color: COL_HIGHLIGHT, weight: 3, opacity: 0.9 });
            } else {
                const style = getLinkStyle(l);
                ll.line.setStyle(style);
            }
        }
    }
}

function toggleTracePanel() {
    const panel = document.getElementById('trace-panel');
    const btn = document.getElementById('btn-trace');
    const visible = panel.style.display === 'block';
    panel.style.display = visible ? 'none' : 'block';
    btn.classList.toggle('active', !visible);

    if (!visible) {
        populateTracePanel();
    }
}

function populateTracePanel() {
    const body = document.getElementById('trace-body');
    if (messages.length === 0) {
        body.innerHTML = '<div style="padding:8px;color:#6b7280">No messages found in simulation</div>';
        return;
    }

    let html = '';
    for (let i = 0; i < messages.length; i++) {
        const m = messages[i];
        const timeS = (m.time_ms / 1000).toFixed(1);
        const dest = m.dest || '?';
        const isDM = m.msg_type === 'dm';
        const arrow = `${m.node} -> ${dest}`;
        const textSnip = m.text ? (m.text.length > 40 ? m.text.slice(0, 40) + '...' : m.text) : '';

        html += `<div class="msg-item" data-idx="${i}" data-pkt="${m.pkt || ''}">`;
        // First line: time, type badge, route
        html += `<span class="time">${timeS}s</span>`;
        html += `<span class="route">${arrow}</span>`;
        // Second line: badges + airtime
        html += `<div class="msg-meta">`;
        html += `<span class="badge ${m.msg_type}">${isDM ? 'DM' : 'CH'}</span>`;
        if (m.route) {
            html += `<span class="badge ${m.route}">${m.route}</span>`;
        }
        if (m.ack_tracked) {
            html += `<span class="badge ack">ack</span>`;
        }
        if (m.airtime_ms) {
            html += `<span class="airtime">${m.airtime_ms}ms air</span>`;
        }
        html += `</div>`;
        // Third line: message text (if any)
        if (textSnip) {
            html += `<div class="msg-text">${escapeHtml(textSnip)}</div>`;
        }
        html += `</div>`;
    }
    body.innerHTML = html;

    body.querySelectorAll('.msg-item').forEach(el => {
        el.addEventListener('click', () => {
            const pkt = el.dataset.pkt;
            if (!pkt) return;
            body.querySelectorAll('.msg-item').forEach(e => e.classList.remove('active'));
            el.classList.add('active');
            loadTrace(pkt);
        });
    });
}

function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function statRow(key, val, bad) {
    return `<div class="stat-row"><span class="key">${escapeHtml(String(key))}</span><span class="val${bad ? ' bad' : ''}">${escapeHtml(String(val))}</span></div>`;
}

async function loadTrace(pkt) {
    try {
        const resp = await fetch(`/api/sims/${SIM_ID}/deep_trace/${pkt}`);
        const trace = await resp.json();
        activeTrace = trace;
        // Find the corresponding message for metadata
        const msg = messages.find(m => m.pkt === pkt);
        renderTrace(trace, msg);
    } catch (e) {
        console.error('Failed to load trace:', e);
    }
}

function renderTrace(trace, msg) {
    // Build hop list with source->dest for each event
    const hops = [];
    let hopNum = 0;

    for (const hop of trace.hops) {
        for (const ev of hop.events) {
            const etype = ev.type;
            let from = null, to = null, type = 'tx';
            if (etype === 'tx') {
                from = ev.node;
                type = hop.relay_from ? 'relay' : (hop.response_from ? 'response' : 'tx');
            } else if (etype === 'rx') {
                from = ev.node || ev.from;
                to = ev.to;
                type = 'rx';
            } else if (etype.startsWith('collision')) {
                from = ev.node || ev.from;
                to = ev.to;
                type = 'collision';
            } else if (etype.startsWith('drop')) {
                from = ev.node || ev.from;
                to = ev.to || ev.node;
                type = 'drop';
            }

            hops.push({
                num: hopNum,
                time_ms: ev.time_ms,
                from, to, type,
                pkt: hop.pkt,
                snr: ev.snr,
            });
        }
        hopNum++;
    }

    // Draw on map
    if (topology.has_geo) {
        drawLeafletTrace(hops);
    } else {
        traceForceData = hops;
        drawForce();
    }

    // Show hop detail in trace panel
    showTraceDetail(trace, hops, msg);
}

function drawLeafletTrace(hops) {
    traceLayer.clearLayers();

    // Count hops per undirected link for spreading
    const linkCounts = {};
    const linkIndex = {};
    for (const hop of hops) {
        if (!hop.from || !hop.to) continue;
        const key = [hop.from, hop.to].sort().join('|');
        linkCounts[key] = (linkCounts[key] || 0) + 1;
        linkIndex[key] = 0;
    }

    let lineNum = 0;
    for (const hop of hops) {
        if (!hop.from || !hop.to) continue;
        const fromPos = getNodePos(hop.from);
        const toPos = getNodePos(hop.to);
        if (!fromPos || !toPos || fromPos.lat == null || toPos.lat == null) continue;

        let color, weight, dashArray;
        if (hop.type === 'tx' || hop.type === 'response') {
            color = '#d97706'; weight = 4; dashArray = null;
        } else if (hop.type === 'relay') {
            color = '#2563eb'; weight = 3; dashArray = null;
        } else if (hop.type === 'rx') {
            color = '#16a34a'; weight = 3; dashArray = null;
        } else if (hop.type === 'collision') {
            color = '#dc2626'; weight = 2; dashArray = '6,4';
        } else if (hop.type === 'drop') {
            color = '#be185d'; weight = 2; dashArray = '4,4';
        } else {
            color = '#6b7280'; weight = 2; dashArray = null;
        }

        // Compute perpendicular offset to spread overlapping hops
        const key = [hop.from, hop.to].sort().join('|');
        const total = linkCounts[key];
        const idx = linkIndex[key]++;
        const pts = offsetLatLng(fromPos, toPos, total, idx);

        const line = L.polyline(pts, { color, weight, opacity: 0.85, dashArray });
        traceLayer.addLayer(line);

        // Arrowhead at ~70% along the line (toward destination)
        const arrowPos = 0.7;
        const aLat = pts[0][0] + (pts[1][0] - pts[0][0]) * arrowPos;
        const aLon = pts[0][1] + (pts[1][1] - pts[0][1]) * arrowPos;
        const dx = pts[1][1] - pts[0][1];
        const dy = pts[1][0] - pts[0][0];
        const angle = Math.atan2(dx, dy) * (180 / Math.PI);
        const arrowMarker = L.marker([aLat, aLon], {
            icon: L.divIcon({
                className: '',
                html: `<div style="transform:rotate(${angle}deg);color:${color};font-size:16px;font-weight:bold;line-height:1;text-shadow:0 0 2px rgba(255,255,255,0.8)">&#9654;</div>`,
                iconSize: [16, 16],
                iconAnchor: [8, 8],
            }),
            interactive: false,
        });
        traceLayer.addLayer(arrowMarker);

        // Hop number at midpoint of offset line
        const midLat = (pts[0][0] + pts[1][0]) / 2;
        const midLon = (pts[0][1] + pts[1][1]) / 2;
        lineNum++;
        const numMarker = L.marker([midLat, midLon], {
            icon: L.divIcon({
                className: 'hop-number',
                html: `<div style="background:${color};color:#fff;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:bold;border:1px solid rgba(0,0,0,0.2)">${lineNum}</div>`,
                iconSize: [16, 16],
                iconAnchor: [8, 8],
            }),
            interactive: false,
        });
        traceLayer.addLayer(numMarker);
    }
}

// Offset a line between two geo points perpendicular to its direction.
// When multiple hops share the same link, they fan out evenly.
function offsetLatLng(fromPos, toPos, total, idx) {
    const SPREAD = 0.00012; // ~13m at mid-latitudes, visually clear at city zoom
    if (total <= 1) return [[fromPos.lat, fromPos.lon], [toPos.lat, toPos.lon]];

    // Perpendicular unit vector in lat/lon space
    const dlat = toPos.lat - fromPos.lat;
    const dlon = toPos.lon - fromPos.lon;
    const len = Math.sqrt(dlat * dlat + dlon * dlon) || 1e-9;
    const px = -dlon / len; // perpendicular x (lat component)
    const py = dlat / len;  // perpendicular y (lon component)

    // Center the fan: offsets go from -(total-1)/2 to +(total-1)/2
    const shift = (idx - (total - 1) / 2) * SPREAD;
    return [
        [fromPos.lat + px * shift, fromPos.lon + py * shift],
        [toPos.lat + px * shift, toPos.lon + py * shift],
    ];
}

function drawForceTrace() {
    if (!traceForceData || !forceCtx) return;
    const nodeMap = {};
    forceNodes.forEach(n => nodeMap[n.name] = n);

    // Count hops per undirected link for spreading
    const linkCounts = {};
    const linkIndex = {};
    for (const hop of traceForceData) {
        if (!hop.from || !hop.to) continue;
        const key = [hop.from, hop.to].sort().join('|');
        linkCounts[key] = (linkCounts[key] || 0) + 1;
        linkIndex[key] = 0;
    }

    const SPREAD_PX = 8; // pixels between parallel lines

    let lineNum = 0;
    for (const hop of traceForceData) {
        if (!hop.from || !hop.to) continue;
        const s = nodeMap[hop.from], t = nodeMap[hop.to];
        if (!s || !t) continue;

        let color;
        if (hop.type === 'tx' || hop.type === 'response') color = '#d97706';
        else if (hop.type === 'relay') color = '#2563eb';
        else if (hop.type === 'rx') color = '#16a34a';
        else if (hop.type === 'collision') color = '#dc2626';
        else if (hop.type === 'drop') color = '#be185d';
        else color = '#6b7280';

        // Compute perpendicular offset for spreading
        const key = [hop.from, hop.to].sort().join('|');
        const total = linkCounts[key];
        const idx = linkIndex[key]++;
        const shift = (idx - (total - 1) / 2) * SPREAD_PX;
        const dx = t.x - s.x, dy = t.y - s.y;
        const len = Math.sqrt(dx * dx + dy * dy) || 1;
        const px = -dy / len, py = dx / len; // perpendicular
        const x0 = s.x + px * shift, y0 = s.y + py * shift;
        const x1 = t.x + px * shift, y1 = t.y + py * shift;

        forceCtx.save();
        forceCtx.strokeStyle = color;
        forceCtx.lineWidth = hop.type === 'tx' ? 4 : 3;
        forceCtx.globalAlpha = 0.85;
        if (hop.type === 'collision' || hop.type === 'drop') {
            forceCtx.setLineDash([6, 4]);
        }
        forceCtx.beginPath();
        forceCtx.moveTo(x0, y0);
        forceCtx.lineTo(x1, y1);
        forceCtx.stroke();
        forceCtx.restore();

        // Arrowhead at ~70% along the line
        const ax = x0 + (x1 - x0) * 0.7, ay = y0 + (y1 - y0) * 0.7;
        const angle = Math.atan2(y1 - y0, x1 - x0);
        const aSize = 8;
        forceCtx.save();
        forceCtx.fillStyle = color;
        forceCtx.globalAlpha = 0.9;
        forceCtx.beginPath();
        forceCtx.moveTo(ax + Math.cos(angle) * aSize, ay + Math.sin(angle) * aSize);
        forceCtx.lineTo(ax + Math.cos(angle + 2.5) * aSize * 0.6, ay + Math.sin(angle + 2.5) * aSize * 0.6);
        forceCtx.lineTo(ax + Math.cos(angle - 2.5) * aSize * 0.6, ay + Math.sin(angle - 2.5) * aSize * 0.6);
        forceCtx.closePath();
        forceCtx.fill();
        forceCtx.restore();

        // Hop number at midpoint
        lineNum++;
        const mx = (x0 + x1) / 2, my = (y0 + y1) / 2;
        forceCtx.save();
        forceCtx.fillStyle = color;
        forceCtx.beginPath();
        forceCtx.arc(mx, my, 8, 0, 2 * Math.PI);
        forceCtx.fill();
        forceCtx.fillStyle = '#fff';
        forceCtx.font = 'bold 9px monospace';
        forceCtx.textAlign = 'center';
        forceCtx.textBaseline = 'middle';
        forceCtx.fillText(lineNum, mx, my);
        forceCtx.restore();
    }
}

function showTraceDetail(trace, hops, msg) {
    const body = document.getElementById('trace-body');
    let html = '<div class="trace-detail">';
    html += `<div style="margin-bottom:6px"><strong style="color:#4338ca">Trace: ${trace.root_pkt}</strong>`;
    html += ` <button onclick="clearTrace()" style="float:right;background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;border-radius:3px;cursor:pointer;font-size:10px;padding:1px 6px">Clear</button></div>`;

    // Message summary
    if (msg) {
        const isDM = msg.msg_type === 'dm';
        html += `<div style="margin-bottom:6px;padding:4px 6px;background:#f3f4f6;border-radius:3px;border:1px solid #e5e7eb">`;
        html += `<div style="color:#374151">${msg.node} -> ${msg.dest || '?'}</div>`;
        if (msg.text) {
            html += `<div style="color:#6b7280;font-size:10px;margin-top:1px">${escapeHtml(msg.text.length > 60 ? msg.text.slice(0, 60) + '...' : msg.text)}</div>`;
        }
        html += `<div style="margin-top:2px;display:flex;gap:4px;align-items:center">`;
        html += `<span class="badge ${msg.msg_type}" style="padding:0 4px;border-radius:2px;font-size:9px;font-weight:bold;background:${isDM ? '#dbeafe' : '#dcfce7'};color:${isDM ? '#1e40af' : '#166534'}">${isDM ? 'DM' : 'CH'}</span>`;
        if (msg.route) {
            html += `<span style="padding:0 4px;border-radius:2px;font-size:9px;font-weight:bold;background:#fef3c7;color:#92400e">${msg.route}</span>`;
        }
        if (msg.ack_tracked) {
            html += `<span style="padding:0 4px;border-radius:2px;font-size:9px;font-weight:bold;background:#f3e8ff;color:#6b21a8">ack</span>`;
        }
        if (msg.airtime_ms) {
            html += `<span style="color:#9ca3af;font-size:10px">${msg.airtime_ms}ms air</span>`;
        }
        html += `</div>`;
        html += `</div>`;
    }

    // Compute trace stats
    const rxNodes = new Set();
    const collNodes = new Set();
    let firstTxTime = Infinity, lastRxTime = 0;
    for (const h of hops) {
        if (h.type === 'rx' && h.to) { rxNodes.add(h.to); lastRxTime = Math.max(lastRxTime, h.time_ms); }
        if (h.type === 'collision' && h.to) collNodes.add(h.to);
        if (h.type === 'tx' && h.time_ms < firstTxTime) firstTxTime = h.time_ms;
    }
    const latencyMs = lastRxTime > firstTxTime ? lastRxTime - firstTxTime : 0;

    html += `<div style="margin-bottom:4px;color:#6b7280">`;
    html += `${trace.hops.length} relay hops`;
    html += ` &middot; ${rxNodes.size} receivers`;
    if (collNodes.size > 0) {
        html += ` &middot; <span style="color:#dc2626">${collNodes.size} collisions</span>`;
    }
    if (latencyMs > 0) {
        html += ` &middot; ${(latencyMs / 1000).toFixed(2)}s e2e`;
    }
    html += `</div>`;

    let lineNum = 0;
    for (const hop of hops) {
        if (!hop.from && !hop.to) continue;
        lineNum++;
        const timeS = (hop.time_ms / 1000).toFixed(2);
        const label = hop.to ? `${hop.from} -> ${hop.to}` : hop.from;
        const snrStr = hop.snr != null ? ` SNR=${hop.snr.toFixed(1)}` : '';
        html += `<div class="hop-row" data-node="${hop.to || hop.from}">`;
        html += `<span class="hop-num">${lineNum}</span> `;
        html += `<span class="hop-type ${hop.type}">${hop.type}</span> `;
        html += `<span style="color:#374151">${timeS}s</span> `;
        html += `<span style="color:#6b7280">${label}${snrStr}</span>`;
        html += `</div>`;
    }
    html += '</div>';
    body.innerHTML = html;

    // Click hop to pan
    body.querySelectorAll('.hop-row').forEach(el => {
        el.addEventListener('click', () => {
            const nodeName = el.dataset.node;
            if (!nodeName) return;
            if (topology.has_geo) {
                const pos = getNodePos(nodeName);
                if (pos && pos.lat != null) {
                    leafletMap.panTo([pos.lat, pos.lon]);
                }
            }
        });
    });
}

function clearTrace() {
    activeTrace = null;
    traceForceData = null;
    if (traceLayer) traceLayer.clearLayers();
    if (!topology.has_geo) drawForce();
    // Go back to message list
    populateTracePanel();
}

                        forceCtx.globalAlpha = 0.1;
                        forceCtx.beginPath();
                        forceCtx.arc(n.x, n.y, r + 1, 0, 2 * Math.PI);
                        forceCtx.fillStyle = '#f5f5f8';
                        forceCtx.fill();
                        forceCtx.globalAlpha = 0.15;
                        forceCtx.beginPath();
                        forceCtx.arc(n.x, n.y, r, 0, 2 * Math.PI);
                        forceCtx.fillStyle = getNodeColor(n.name, n.role);
                        forceCtx.fill();
                        forceCtx.globalAlpha = 1;
                    }
                }
            }
        }
    });
}

// ── Node Events Modal ─────────────────────────────────────────

let evModalEvents = [];    // raw events for current node
let evModalFiltered = [];  // after type filter
let evModalNode = '';
let evModalSort = { col: 'time_ms', asc: true };
let evModalTypeFilter = { tx: true, rx: true, collision: true, drop: true, cmd: true };

function categorizeEvent(ev) {
    const t = ev.type || '';
    if (t === 'tx') return 'tx';
    if (t === 'rx') return 'rx';
    if (t.startsWith('collision')) return 'collision';
    if (t.startsWith('drop') || t.startsWith('adversarial')) return 'drop';
    if (t === 'cmd_reply') return 'cmd';
    return 'cmd';
}

function evPeer(ev, nodeName) {
    const t = ev.type || '';
    if (t === 'tx') return '';
    // For RX/collision/drop: return the other node (not us)
    const fr = ev.from || ev.node || '';
    const to = ev.to || '';
    if (fr === nodeName) return to;
    if (to === nodeName) return fr;
    return fr || to;
}

function evDirection(ev, nodeName) {
    const t = ev.type || '';
    if (t === 'tx') return 'out';
    const to = ev.to || '';
    const fr = ev.from || ev.node || '';
    if (t === 'rx') return to === nodeName ? 'in' : (fr === nodeName ? 'out' : '');
    if (t.startsWith('collision') || t.startsWith('drop')) return to === nodeName ? 'in' : '';
    return '';
}

async function openNodeEventsModal(nodeName) {
    evModalNode = nodeName;
    document.getElementById('events-modal').style.display = 'block';
    document.getElementById('events-modal-title').textContent = `Events: ${nodeName}`;
    document.getElementById('events-modal-body').innerHTML = '<div style="padding:20px;color:#9ca3af;text-align:center">Loading...</div>';

    try {
        const resp = await fetch(`/api/sims/${SIM_ID}/node_events/${encodeURIComponent(nodeName)}`);
        const data = await resp.json();
        evModalEvents = data.events || [];
    } catch (e) {
        document.getElementById('events-modal-body').innerHTML = `<div style="padding:20px;color:#dc2626">Failed: ${e.message}</div>`;
        return;
    }

    // Build toolbar with type filter checkboxes + counts
    const counts = { tx: 0, rx: 0, collision: 0, drop: 0, cmd: 0 };
    for (const ev of evModalEvents) counts[categorizeEvent(ev)]++;

    let tbHtml = '';
    for (const [cat, label, col] of [['tx','TX','#b45309'],['rx','RX','#15803d'],['collision','Coll','#dc2626'],['drop','Drop','#be185d'],['cmd','Cmd','#4338ca']]) {
        const checked = evModalTypeFilter[cat] ? 'checked' : '';
        tbHtml += `<label style="color:${col}"><input type="checkbox" data-cat="${cat}" ${checked}> ${label} (${counts[cat]})</label>`;
    }
    tbHtml += `<span class="sep"></span>`;
    tbHtml += `<span style="color:#9ca3af;font-size:10px">${evModalEvents.length} total</span>`;
    document.getElementById('events-modal-toolbar').innerHTML = tbHtml;

    // Checkbox listeners
    document.querySelectorAll('#events-modal-toolbar input[type=checkbox]').forEach(cb => {
        cb.addEventListener('change', () => {
            evModalTypeFilter[cb.dataset.cat] = cb.checked;
            applyEvModalFilter();
        });
    });

    applyEvModalFilter();
    drawEvDensity();
}

function applyEvModalFilter() {
    evModalFiltered = evModalEvents.filter(ev => evModalTypeFilter[categorizeEvent(ev)]);
    sortEvModal();
    renderEvTable();
}

function sortEvModal() {
    const col = evModalSort.col;
    const dir = evModalSort.asc ? 1 : -1;
    evModalFiltered.sort((a, b) => {
        let va, vb;
        if (col === 'time_ms') { va = a.time_ms || 0; vb = b.time_ms || 0; }
        else if (col === 'type') { va = categorizeEvent(a); vb = categorizeEvent(b); }
        else if (col === 'peer') { va = evPeer(a, evModalNode); vb = evPeer(b, evModalNode); }
        else if (col === 'pkt_type') { va = a.pkt_type || ''; vb = b.pkt_type || ''; }
        else if (col === 'route') { va = a.route || ''; vb = b.route || ''; }
        else if (col === 'snr') { va = a.snr ?? -999; vb = b.snr ?? -999; }
        else if (col === 'airtime') { va = a.airtime_ms || 0; vb = b.airtime_ms || 0; }
        else { va = 0; vb = 0; }
        if (typeof va === 'string') return dir * va.localeCompare(vb);
        return dir * (va - vb);
    });
}

function renderEvTable() {
    const cols = [
        { key: 'time_ms', label: 'Time' },
        { key: 'type', label: 'Type' },
        { key: 'dir', label: 'Dir' },
        { key: 'peer', label: 'Peer' },
        { key: 'pkt_type', label: 'Pkt Type' },
        { key: 'route', label: 'Route' },
        { key: 'snr', label: 'SNR' },
        { key: 'airtime', label: 'Airtime' },
        { key: 'pkt', label: 'Pkt' },
    ];

    let html = '<table class="ev-table"><thead><tr>';
    for (const c of cols) {
        const arrow = evModalSort.col === c.key ? (evModalSort.asc ? ' ▲' : ' ▼') : '';
        html += `<th data-col="${c.key}">${c.label}${arrow ? `<span class="sort-arrow">${arrow}</span>` : ''}</th>`;
    }
    html += '</tr></thead><tbody>';

    for (const ev of evModalFiltered) {
        const cat = categorizeEvent(ev);
        const timeS = (ev.time_ms / 1000).toFixed(2);
        const peer = evPeer(ev, evModalNode);
        const dir = evDirection(ev, evModalNode);
        const dirIcon = dir === 'in' ? '←' : dir === 'out' ? '→' : '';
        const snr = ev.snr != null ? ev.snr.toFixed(1) : '';
        const airtime = ev.airtime_ms ? ev.airtime_ms + 'ms' : '';
        const pkt = ev.pkt || '';
        const pktType = ev.pkt_type || '';
        const route = ev.route || '';
        const typeLabel = ev.type || '';

        // For cmd_reply, show command+reply instead of peer/pkt_type
        let extra = '';
        if (cat === 'cmd') {
            extra = ev.command ? escapeHtml(ev.command.length > 30 ? ev.command.slice(0, 30) + '..' : ev.command) : '';
            if (ev.reply) extra += ' → ' + escapeHtml(ev.reply.length > 30 ? ev.reply.slice(0, 30) + '..' : ev.reply);
        }

        html += `<tr class="type-${cat}">`;
        html += `<td>${timeS}s</td>`;
        html += `<td><span class="ev-badge ${cat}">${typeLabel}</span></td>`;
        html += `<td>${dirIcon}</td>`;
        html += `<td>${cat === 'cmd' ? '' : (peer ? `<span class="node-link" data-node="${peer}">${peer}</span>` : '')}</td>`;
        html += `<td>${cat === 'cmd' ? `<span style="color:#9ca3af;font-size:10px" title="${escapeHtml(extra)}">${extra}</span>` : pktType}</td>`;
        html += `<td>${route}</td>`;
        html += `<td>${snr}</td>`;
        html += `<td>${airtime}</td>`;
        html += `<td>${pkt ? `<span class="pkt-link" data-pkt="${pkt}">${pkt}</span>` : ''}</td>`;
        html += `</tr>`;
    }
    html += '</tbody></table>';

    document.getElementById('events-modal-body').innerHTML = html;

    // Footer
    document.getElementById('events-modal-footer').textContent =
        `Showing ${evModalFiltered.length} of ${evModalEvents.length} events`;

    // Column sort click
    document.querySelectorAll('#events-modal .ev-table th').forEach(th => {
        th.addEventListener('click', () => {
            const col = th.dataset.col;
            if (col === 'dir' || col === 'pkt') return; // not sortable
            if (evModalSort.col === col) evModalSort.asc = !evModalSort.asc;
            else { evModalSort.col = col; evModalSort.asc = true; }
            sortEvModal();
            renderEvTable();
        });
    });

    // Pkt hash click -> close modal, trigger trace
    document.querySelectorAll('#events-modal .pkt-link').forEach(el => {
        el.addEventListener('click', () => {
            const pkt = el.dataset.pkt;
            closeEventsModal();
            // Open trace panel and load this trace
            document.getElementById('trace-panel').style.display = 'block';
            document.getElementById('btn-trace').classList.add('active');
            loadTrace(pkt);
        });
    });

    // Peer node click -> close modal, select that node
    document.querySelectorAll('#events-modal .node-link').forEach(el => {
        el.addEventListener('click', () => {
            const node = el.dataset.node;
            closeEventsModal();
            selectNode(node);
        });
    });
}

function drawEvDensity() {
    const canvas = document.getElementById('events-density-canvas');
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * devicePixelRatio;
    canvas.height = rect.height * devicePixelRatio;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(devicePixelRatio, devicePixelRatio);
    const W = rect.width, H = rect.height;

    ctx.clearRect(0, 0, W, H);
    if (evModalEvents.length === 0) return;

    const tMin = evModalEvents[0].time_ms || 0;
    const tMax = evModalEvents[evModalEvents.length - 1].time_ms || tMin + 1;
    const nBuckets = Math.min(Math.max(40, Math.floor(W / 4)), 200);
    const bucketMs = Math.max(1, (tMax - tMin) / nBuckets);

    const catColors = { tx: '#d97706', rx: '#16a34a', collision: '#dc2626', drop: '#be185d', cmd: '#4338ca' };
    const buckets = {};
    for (const cat of Object.keys(catColors)) buckets[cat] = new Array(nBuckets).fill(0);

    for (const ev of evModalEvents) {
        const cat = categorizeEvent(ev);
        const b = Math.min(Math.floor((ev.time_ms - tMin) / bucketMs), nBuckets - 1);
        buckets[cat][b]++;
    }

    // Find max for scaling
    let maxVal = 1;
    for (let i = 0; i < nBuckets; i++) {
        let sum = 0;
        for (const cat of Object.keys(catColors)) sum += buckets[cat][i];
        maxVal = Math.max(maxVal, sum);
    }

    // Draw stacked bars
    const barW = W / nBuckets;
    for (let i = 0; i < nBuckets; i++) {
        let y = H;
        for (const cat of ['rx', 'tx', 'collision', 'drop', 'cmd']) {
            const v = buckets[cat][i];
            if (v === 0) continue;
            const barH = (v / maxVal) * (H - 2);
            y -= barH;
            ctx.fillStyle = catColors[cat];
            ctx.globalAlpha = 0.8;
            ctx.fillRect(i * barW, y, Math.max(1, barW - 0.5), barH);
        }
    }
    ctx.globalAlpha = 1;
}

function closeEventsModal() {
    document.getElementById('events-modal').style.display = 'none';
    evModalEvents = [];
    evModalFiltered = [];
}

// Modal close handlers
document.getElementById('events-modal-close').addEventListener('click', closeEventsModal);
document.querySelector('#events-modal .backdrop').addEventListener('click', closeEventsModal);
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && document.getElementById('events-modal').style.display === 'block') {
        closeEventsModal();
    }
});

init();
</script>
